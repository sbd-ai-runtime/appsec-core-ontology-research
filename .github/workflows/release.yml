name: Release and Publish to Zenodo

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      sandbox:
        description: 'Publish to Zenodo Sandbox'
        type: boolean
        default: true
      tag:
        description: 'Tag/version to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Tag is not on main. Aborting."
            exit 1
          fi

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          SANDBOX="${{ github.event.inputs.sandbox || 'false' }}"
          echo "sandbox=${SANDBOX}" >> "$GITHUB_OUTPUT"

      - name: Find release notes
        id: notes
        run: |
          MINOR="${{ steps.version.outputs.version }}"
          MINOR="${MINOR%.*}"
          FILE="RELEASE-NOTES-${MINOR}.md"
          if [ -f "$FILE" ]; then
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "file=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Package repository
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip -r "appsec-core-ontology-research-${VERSION}.zip" . \
            -x ".git/*" -x ".github/*" -x "*.pyc" -x "__pycache__/*"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "AppSec Core Ontology Research ${VERSION}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            "appsec-core-ontology-research-${VERSION}.zip"

      - name: Install Python deps
        run: pip install requests

      - name: Publish to Zenodo
        id: zenodo
        env:
          ZENODO_TOKEN: ${{ steps.version.outputs.sandbox == 'true' && secrets.ZENODO_SANDBOX_TOKEN || secrets.ZENODO_TOKEN }}
          ZENODO_CONCEPT_RECORD_ID: ${{ steps.version.outputs.sandbox == 'true' && secrets.ZENODO_SANDBOX_CONCEPT_RECORD_ID || secrets.ZENODO_CONCEPT_RECORD_ID }}
          ZENODO_SANDBOX: ${{ steps.version.outputs.sandbox }}
          VERSION: ${{ steps.version.outputs.version }}
          ARCHIVE: appsec-core-ontology-research-${{ steps.version.outputs.version }}.zip
        run: python3 scripts/zenodo_publish.py

      - name: Summary
        run: |
          echo "### Published to Zenodo" >> "$GITHUB_STEP_SUMMARY"
          echo "- DOI: ${{ steps.zenodo.outputs.doi }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.zenodo.outputs.doi_url }}" >> "$GITHUB_STEP_SUMMARY"
