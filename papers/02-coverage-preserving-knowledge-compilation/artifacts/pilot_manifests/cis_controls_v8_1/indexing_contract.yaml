meta:
  pilot_id: cis_controls_v8_1
  status: published_traceability_surface_control_compared
input_contract:
  source_manifest: pilots/cis_controls_v8_1/source_manifest.yaml
  accepted_source_artifacts:
    - version_page_html
    - controls_list_html
  required_provenance_fields:
    - source_document_id
    - canonical_url
    - publication_date
    - retrieved_at
    - checksum_sha256
stage_outputs:
  source_retrieval_receipt:
    path: data/cis_controls_v8_1/stubs/source_retrieval_receipt.json
  source_inventory:
    path: data/cis_controls_v8_1/stubs/external_source_inventory.json
  source_unit_inventory:
    path: data/cis_controls_v8_1/stubs/source_unit_inventory.json
  source_object_inventory:
    path: data/cis_controls_v8_1/stubs/source_object_inventory.json
  normalized_core_objects:
    path: data/cis_controls_v8_1/stubs/appsec_core_normalization.json
  manual_gap_read:
    path: data/cis_controls_v8_1/stubs/manual_gap_analysis.json
  published_traceability_comparison:
    path: data/cis_controls_v8_1/stubs/published_manual_traceability_control_comparison.json
pipeline_scripts:
  source_object_extraction:
    path: scripts/extract_cis_controls_source_objects.py
  appsec_core_normalization:
    path: scripts/normalize_cis_controls_to_appsec_core.py
  manual_gap_read:
    path: scripts/derive_cis_manual_gap_analysis.py
  published_traceability_comparison:
    path: scripts/compare_cis_controls_against_published_manual_traceability_surface.py
normalization_rules:
  - external_objects_land_in_appsec_core_before_any_manual_comparison
  - cis_controls_are_initially_handled_at_control_level_not_safeguard_level
  - broad_enterprise_controls_may_resolve_to_out_of_scope_or_comparison_gap
  - rationale_for_boundary_decisions_must_be_preserved
comparison_rules:
  status_labels:
    - covered
    - partial
    - bridge_only
    - ambiguous
    - manual_gap
    - appsec_core_gap
    - comparison_gap
    - out_of_scope_for_appsec_core
