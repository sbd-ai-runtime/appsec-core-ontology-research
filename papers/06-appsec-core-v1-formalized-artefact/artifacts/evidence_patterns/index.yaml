    runtime_source: data/publish/runtime/evidence_patterns.json
    analysis_note: docs/project/working-notes/2026-04-03-appsec-core-evidence-pattern-analysis.md
purpose:
  current_goal: >
    Provide one compact global read of the current EvidencePattern surface so
    AppSec Core v0 can be reviewed as a semantically grounded model instead of
    a purely descriptive one.
  non_goals:
    - replacing_runtime_source_data
    - publishing_one_fully_normalized_slice_local_evidencepattern_merge
    - introducing_execution_binding
    - introducing_V3_result_models
