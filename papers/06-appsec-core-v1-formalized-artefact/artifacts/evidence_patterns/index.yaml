  version: '0.1'
  status: working_draft
  maturity: supporting_surface_entry
  description: >
    Lightweight global supporting index for EvidencePattern in AppSec Core v0.
    This index is aligned to the current runtime output and is intended for
    review and packaging decisions, not as a final normalized merged instance
    set.
  related_artifacts:
    evidence_pattern_contract: ontology/appsec-core-evidence-pattern-v0-draft.yaml
    consolidated_review: ontology/appsec-core-v0-consolidated.yaml
