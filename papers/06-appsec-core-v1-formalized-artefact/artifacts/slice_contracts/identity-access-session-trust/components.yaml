current_manual_practice_mappings:
  - source_practice_id: 08-iac-infraestrutura:segregacao-de-ambientes-tagging-e-permissoes-minimas
    target_practice_id: ACP-IAT-002
  - source_practice_id: 08-iac-infraestrutura:enforcement-automatico-de-politicas
    target_practice_id: ACP-IAT-005
  - source_practice_id: 09-containers-imagens:rbac-minimo-e-serviceaccounts-dedicadas
    target_practice_id: ACP-IAT-002
  - source_practice_id: 14-governanca-contratacao:revisao-trimestral-de-acesso-de-contractors-least-privilege
    target_practice_id: ACP-IAT-003
  - source_practice_id: 12-monitorizacao-operacoes:seguranca-e-integridade-de-logs
    target_practice_id: ACP-IAT-006
notes:
  practice_surface_limit:
    note: >
      This slice has a weaker and more mixed current practice surface than the
      first slice, so the normalized practice subset is intentionally small.
  session_gap:
    note: >
      No current practice record cleanly expresses user-session and JWT-lifetime
      management yet, so `ACP-IAT-004` is mostly objective-led at this stage.
  secrets_boundary:
    note: >
      Workload identity and OIDC-for-secrets material remains adjacent but is
      not promoted here as the main practice anchor for the slice.
open_questions:
  - Should `ACP-IAT-004` wait for stronger practice evidence before being treated as a stable normalized practice?
  - Should `ACA-IAT-004` and `ACA-IAT-005` remain separate artifacts, or later collapse into one policy-enforcement evidence family?
  - Is `09-containers-imagens:rbac-minimo-e-serviceaccounts-dedicadas` a legitimate bridge practice for this slice, or too biased toward workload identity?
  - Which future artifact should become the primary anchor for federation and MFA configuration once the artifact taxonomy is expanded?
