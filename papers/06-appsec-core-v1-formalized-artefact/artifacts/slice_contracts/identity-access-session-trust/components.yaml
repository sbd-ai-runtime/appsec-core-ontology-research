      - ACO-IAT-005
      - ACO-IAT-007
  ACA-IAT-002:
    source_artifact_id: ART-access-review-e0648977e7
    canonical_role: governance_record
    local_role: governance_record
    supports_objectives:
      - ACO-IAT-002
      - ACO-IAT-003
      - ACO-IAT-007
  ACA-IAT-003:
    source_artifact_id: ART-log-stream-b67ee06f7e
    canonical_role: operational_record
    local_role: audit_trail
    supports_objectives:
      - ACO-IAT-001
      - ACO-IAT-003
      - ACO-IAT-004
      - ACO-IAT-005
