meta:
  name: AppSec Core Slice Components Draft
  version: '0.1'
  status: working_draft
  scope: identity_access_and_session_trust
  description: >
    Minimal normalized subset of practices, mechanisms and artifacts used to
    validate the AppSec core slice draft for identity, access and session trust.
  target_core_draft: ontology/appsec-core-identity-access-session-trust-draft.yaml
  target_mapping_draft: ontology/appsec-core-identity-access-session-trust-mapping-draft.yaml
normalized_practices:
  ACP-IAT-001:
    name: Strong Authentication And Step-Up Enforcement
    practice_family: identity_and_trust_control
    local_practice_type: authentication
    supports_objectives:
      - ACO-IAT-001
    description: Enforce strong authentication, adaptive challenge or reauthentication when access or action sensitivity increases
  ACP-IAT-002:
    name: Least-Privilege Authorization Governance
    practice_family: identity_and_trust_control
    local_practice_type: authorization
    supports_objectives:
      - ACO-IAT-002
      - ACO-IAT-007
    description: Keep permission models explicit, separated by role or attribute and bounded by least-privilege rules
  ACP-IAT-003:
    name: Access Review And Timely Revocation
    practice_family: identity_and_trust_control
    local_practice_type: revocation
    supports_objectives:
      - ACO-IAT-003
      - ACO-IAT-007
    description: Review granted access regularly and propagate revocation quickly across identities, permissions and active sessions
  ACP-IAT-004:
    name: Bounded Session And Token Management
    practice_family: identity_and_trust_control
    local_practice_type: session_management
    supports_objectives:
      - ACO-IAT-004
    description: Keep session identifiers and tokens bounded by transport, scope, TTL and explicit invalidation rules
  ACP-IAT-005:
    name: Authenticated API Boundary Enforcement
    practice_family: identity_and_trust_control
    local_practice_type: gateway_enforcement
    supports_objectives:
      - ACO-IAT-005
      - ACO-IAT-007
    description: Authenticate callers and enforce authorization decisions consistently at API and service boundaries
  ACP-IAT-006:
    name: Access Abuse Monitoring And Audit Trail
    practice_family: rollout_recovery_and_runtime_records
    local_practice_type: audit
    supports_objectives:
      - ACO-IAT-006
      - ACO-IAT-007
    description: Make rejected access, abuse signals and externally visible calls auditable and operationally reviewable
normalized_mechanisms:
  ACM-IAT-001:
    name: Authentication And Federation Protocols
    mechanism_family: identity_and_trust_control
    local_mechanism_type: identity_protocol
    source_semantic_ids:
      - sem:mechanism:autenticacao
      - sem:mechanism:oidc
    supports_practices:
      - ACP-IAT-001
      - ACP-IAT-005
  ACM-IAT-002:
    name: Access Policy Enforcement
    mechanism_family: policy_and_gate_enforcement
    local_mechanism_type: policy_engine
    source_semantic_ids:
      - sem:mechanism:controlo-de-acesso
    supports_practices:
      - ACP-IAT-002
      - ACP-IAT-005
  ACM-IAT-003:
    name: Periodic Review And Access Audit
    mechanism_family: governance_and_review
    local_mechanism_type: telemetry
    source_semantic_ids:
      - sem:mechanism:auditoria
      - sem:mechanism:auditorias-periodicas
    supports_practices:
      - ACP-IAT-003
      - ACP-IAT-006
  ACM-IAT-004:
    name: Short-Lived Token Controls
    mechanism_family: identity_and_trust_control
    local_mechanism_type: token_control
    source_semantic_ids:
      - sem:mechanism:tokens-de-curta-duracao
    supports_practices:
      - ACP-IAT-004
    note: >
      The current semantic anchor comes mostly from adjacent operational-identity
      material, so this mechanism is useful but not yet a perfect manual fit for
      user-session semantics.
  ACM-IAT-005:
    name: API Gateway Mutual Authentication
    mechanism_family: identity_and_trust_control
    local_mechanism_type: gateway
    source_semantic_ids:
      - sem:mechanism:api-gateway-com-autenticacao-mutua
    supports_practices:
      - ACP-IAT-005
  ACM-IAT-006:
    name: Structured Logging And Effective Configuration Recording
    mechanism_family: rollout_recovery_and_runtime_records
    local_mechanism_type: telemetry
    source_semantic_ids:
      - sem:mechanism:registo-de-configuracao-efetiva
      - sem:mechanism:retencao-estruturada-de-logs-metadados-e-correlacoes-commit-pipeline-release
      - sem:mechanism:logs-mascarados
    supports_practices:
      - ACP-IAT-006
