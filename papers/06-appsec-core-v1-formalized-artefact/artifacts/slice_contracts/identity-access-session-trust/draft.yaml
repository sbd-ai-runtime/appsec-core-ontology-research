meta:
  name: AppSec Core Slice Draft
  version: '0.1'
  status: working_draft
  scope: identity_access_and_session_trust
  description: >
    Second narrow draft for a future reusable AppSec Core derived from the
    SbD-ToE V2 ontology. This draft intentionally models only one slice:
    identity, access and session trust.
  derived_from:
    - ontology/sbdtoe-ontology.yaml
    - docs/project/working-notes/2026-04-02-ontology-editorial-vs-domain-inventory.md
    - docs/project/working-notes/2026-04-02-appsec-core-track-prep.md
    - docs/project/working-notes/2026-04-03-appsec-core-slice-identity-access-session-trust.md
  non_goals:
    - regulatory_overlay
    - source_provenance_transversal_layer
    - v3_audit_and_findings
    - secrets_and_workload_identity
    - full_domain_coverage
module_split:
  appsec_core:
    description: Reusable AppSec domain semantics independent from the SbD-ToE editorial structure
    entities:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
      - Threat
      - Signal
  sbdtoe_manual_mapping:
    description: Keeps SbD-ToE-specific requirement/control structures outside the core
    entities:
      - RequirementMapping
      - ControlMapping
  external_alignment:
    status: deferred
    note: SSDF, SAMM, SLSA and similar frameworks should align here later, not in this slice draft
scope:
  domains:
    - identity_assurance
    - authorization
    - access_lifecycle
    - session_trust
    - api_boundary
    - access_observability
    - identity_access_surface
  included_manual_categories:
    - AUT
    - ACC
    - SES
    - API
  excluded_for_now:
    - secrets_and_workload_identity
    - organizational_ownership
    - broad_runtime_monitoring
    - threat_and_signal_normalization
core_entities:
  ControlObjective:
    description: >
      Reusable AppSec objective that expresses what must hold true in the
      domain, without carrying SbD-ToE chapter or requirement structure.
    id_pattern: ACO-IAT-###
    attributes:
      - objective_id: string
      - name: string
      - objective_kind: enum[atomic, composite]
      - domain_key: enum[identity_assurance, authorization, access_lifecycle, session_trust, api_boundary, access_observability, identity_access_surface]
      - objective_type: enum[governance, preventive, detective]
      - statement: string
      - expected_outcome: string
      - verification_posture: string
  Practice:
    description: Reusable implementation or operating practice that helps realize a control objective
    attributes:
      - practice_id: string
      - name: string
      - practice_family: enum[governance_and_review, policy_and_gate_enforcement, identity_and_trust_control, rollout_recovery_and_runtime_records]
      - local_practice_type: enum[authentication, authorization, session_management, gateway_enforcement, revocation, audit]
  Mechanism:
    description: Concrete means used to realize or enforce a control objective
    attributes:
      - mechanism_id: string
      - name: string
      - mechanism_family: enum[governance_and_review, policy_and_gate_enforcement, identity_and_trust_control, rollout_recovery_and_runtime_records]
      - local_mechanism_type: enum[identity_protocol, policy_engine, token_control, gateway, telemetry, abuse_protection]
  Artifact:
    description: Domain artifact or evidence-bearing output used in this slice
    attributes:
      - artifact_id: string
      - name: string
      - canonical_role: enum[configuration, governance_record, operational_record, evidence_package, approval_record, binding_record]
      - local_role: enum[configuration, governance_record, operational_record, evidence, approval_record, authorization_binding, audit_trail, policy_evidence, alert_policy]
  EvidencePattern:
    description: Expected evidence shape that supports deterministic review of an objective
    attributes:
      - evidence_pattern_id: string
      - canonical_evidence_kind: enum[configuration, governance_record, operational_record, evidence_package, approval_record]
      - local_evidence_kind: enum[configuration, governance_record, operational_record, evidence]
      - expectation: string
  Threat:
    description: Security failure mode mitigated by one or more objectives in the slice
    attributes:
      - threat_id: string
      - name: string
  Signal:
    description: Observable review signal relevant to identity, access, session or API trust judgement
    attributes:
      - signal_id: string
      - name: string
relations:
  core_relations:
    - objective_realized_by_practice
    - objective_implemented_by_mechanism
    - objective_expects_artifact
    - objective_verified_by_evidence_pattern
    - artifact_supports_evidence_pattern
    - signal_supports_evidence_pattern
    - threat_mitigated_by_objective
  manual_mapping_relations:
    - manual_requirement_maps_to_objective
    - manual_control_maps_to_objective
  deferred_relations:
    - external_requirement_maps_to_objective
    - finding_challenges_objective
normalized_objectives:
  ACO-IAT-001:
    name: Authentication Strength And Identity Assurance
    objective_kind: atomic
    domain_key: identity_assurance
    objective_type: preventive
    statement: Require strong and context-appropriate authentication for privileged or sensitive access, including MFA, brute-force resistance, federation support and step-up controls where needed
    expected_outcome: Sensitive access does not proceed under weak identity assurance and repeated abusive login attempts are throttled or blocked
    verification_posture: strong_authentication_enforced
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - AUT-001
      - AUT-003
      - AUT-007
      - AUT-008
    expected_artifacts:
      - ART-log-stream-b67ee06f7e
    open_artifact_gap:
      - authentication_policy_artifact
      - federation_config_artifact
      - mfa_enforcement_artifact
  ACO-IAT-002:
    name: Authorization Policy Integrity And Least Privilege
    objective_kind: atomic
    domain_key: authorization
    objective_type: governance
    statement: Maintain explicit authorization policy and identity-to-permission binding under least-privilege constraints, including role-based and attribute-based decisions where appropriate
    expected_outcome: Access decisions remain policy-driven, bounded by least privilege and reviewable against the intended access model
    verification_posture: least_privilege_and_policy_enforcement
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - ACC-001
      - ACC-002
      - ACC-009
    expected_artifacts:
      - ART-identity-binding-f96a2a528c
      - ART-access-review-e0648977e7
    open_artifact_gap:
      - authorization_policy_artifact
  ACO-IAT-003:
    name: Access Revocation And Privilege Lifecycle Integrity
    objective_kind: atomic
    domain_key: access_lifecycle
    objective_type: governance
    statement: Grant, change and revocation of access must propagate predictably across identities, roles and active sessions, with reviewable records for high-risk access changes
    expected_outcome: Removed access stops working promptly and access lifecycle changes can be traced, reviewed and challenged
    verification_posture: immediate_revocation_and_review
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - AUT-004
      - ACC-008
    expected_artifacts:
      - ART-access-review-e0648977e7
      - ART-approval-record-6fe32eb803
      - ART-log-stream-b67ee06f7e
    open_artifact_gap:
      - revocation_event_artifact
      - entitlement_snapshot_artifact
  ACO-IAT-004:
    name: Session And Token Trust Boundaries
    objective_kind: atomic
    domain_key: session_trust
    objective_type: preventive
    statement: Sessions and tokens must be unguessable, transported securely, bounded in scope and lifetime, and revalidated or revoked when client context materially changes
    expected_outcome: Session identifiers and tokens remain difficult to replay or misuse outside their intended trust context and time bounds
    verification_posture: bounded_and_trustworthy_sessions
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - SES-003
      - SES-004
      - SES-005
      - SES-008
    expected_artifacts:
      - ART-log-stream-b67ee06f7e
    open_artifact_gap:
      - session_policy_artifact
      - token_claims_config_artifact
      - session_binding_config_artifact
  ACO-IAT-005:
    name: API Caller Trust And Service Boundary Enforcement
    objective_kind: atomic
    domain_key: api_boundary
    objective_type: preventive
    statement: API and service boundaries must authenticate callers, enforce authorization decisions and reject anonymous or invalid requests consistently at the boundary layer
    expected_outcome: API consumers are trusted only through explicit caller identity and enforced access policy at service or gateway entry points
    verification_posture: authenticated_service_boundary
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - ACC-005
      - API-001
    expected_artifacts:
      - ART-identity-binding-f96a2a528c
      - ART-policy-report-7e52280504
      - ART-log-stream-b67ee06f7e
    open_artifact_gap:
      - api_gateway_config_artifact
      - service_auth_policy_artifact
      - mutual_tls_config_artifact
  ACO-IAT-006:
    name: Access Abuse Detection And Auditability
    objective_kind: atomic
    domain_key: access_observability
    objective_type: detective
    statement: Access surfaces must emit sufficient telemetry to detect abuse, prove rejected access and audit externally visible calls with reviewable context
    expected_outcome: Rate limits, access denials and external-call activity are visible enough to support operational review and post-event investigation
    verification_posture: access_abuse_telemetry
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - API-004
      - API-007
    expected_artifacts:
      - ART-log-stream-b67ee06f7e
      - ART-alert-policy-c55180d8ab
    open_artifact_gap:
      - api_rate_limit_report_artifact
      - external_call_audit_artifact
  ACO-IAT-007:
    name: Identity And Access Control Integrity
    objective_kind: composite
    domain_key: identity_access_surface
    objective_type: governance
    statement: Identity assurance, authorization policy, access revocation, session trust and API boundary enforcement must operate as one coherent access-control surface
    expected_outcome: Principal identity, granted privilege, active session state and API caller enforcement remain mutually consistent under grant, use and revocation conditions
    verification_posture: coherent_identity_access_surface
    composed_of:
      - ACO-IAT-001
      - ACO-IAT-002
      - ACO-IAT-003
      - ACO-IAT-004
      - ACO-IAT-005
      - ACO-IAT-006
    current_manual_control_anchors:
      - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    current_manual_requirement_anchors:
      - ACC-001
      - ACC-005
      - AUT-004
      - API-001
      - SES-008
    expected_artifacts:
      - ART-identity-binding-f96a2a528c
      - ART-access-review-e0648977e7
      - ART-log-stream-b67ee06f7e
    open_artifact_gap:
      - unified_identity_access_policy_artifact
mapping_policy:
  requirement_mapping:
    cardinality: many_to_one_allowed
    note: SbD-ToE requirements stay in the manual layer and project into fewer reusable objectives
  control_mapping:
    cardinality: many_to_one_allowed
    note: >
      The current identity control is wider than this future core slice and must
      decompose rather than be copied unchanged into the core.
  practice_mapping:
    note: >
      Current practice records are useful as supporting hints, but this slice
      should start from requirements and control decomposition rather than from
      the present practice surface.
  current_link_warning:
    note: >
      The current autogenerated requirement_control_links are too noisy to be
      treated as authoritative input for this slice and should remain secondary.
deferred_questions:
  - Should `ACO-IAT-001` later split human-user authentication from machine and workload identity assurance?
  - Should `ACO-IAT-003` remain separate from `ACO-IAT-004`, or later merge into one broader session-and-revocation objective?
  - Should `ACO-IAT-006` remain inside the slice core, or later move to a cross-slice observability capability?
  - When cleaner control decomposition exists, should `ACO-IAT-007` remain a composite `ControlObjective`, or move to a higher-level type such as `Capability`?
