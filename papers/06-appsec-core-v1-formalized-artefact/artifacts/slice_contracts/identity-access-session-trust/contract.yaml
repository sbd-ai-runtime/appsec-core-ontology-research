meta:
  name: AppSec Core Slice Contract
  version: '0.1'
  status: working_contract
  scope: identity_access_and_session_trust
  description: >
    Consolidated contract for the second AppSec core slice. This file does not
    replace the detailed drafts; it defines the current stable reading across
    objectives, mapping rules, normalized components, confidence boundaries and
    immediate continuation criteria.
  related_artifacts:
    objective_draft: ontology/appsec-core-identity-access-session-trust-draft.yaml
    mapping_draft: ontology/appsec-core-identity-access-session-trust-mapping-draft.yaml
    components_draft: ontology/appsec-core-identity-access-session-trust-components-draft.yaml
    slice_note: docs/project/working-notes/2026-04-03-appsec-core-slice-identity-access-session-trust.md
purpose:
  current_goal: >
    Stabilize a second reusable AppSec domain slice on a semantic surface very
    different from supply-chain and build-integrity before opening a third
    slice or pulling in external-alignment frameworks.
  non_goals:
    - regulatory_overlay_expansion
    - v3_audit_persistence
    - source_provenance_transversal_layer
    - third_appsec_slice
module_position:
  appsec_core:
    included:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
    deferred_or_weak:
      - Threat
      - Signal
  sbdtoe_manual_mapping:
    included:
      - requirement_to_objective_mapping
      - control_to_objective_mapping
      - practice_to_normalized_practice_mapping
  external_alignment:
    status: deferred
    note: SSDF, SAMM and SLSA stay out of this contract
objective_set:
  atomic_objectives:
    - ACO-IAT-001
    - ACO-IAT-002
    - ACO-IAT-003
    - ACO-IAT-004
    - ACO-IAT-005
    - ACO-IAT-006
  composite_objectives:
    - ACO-IAT-007
  composite_rules:
    ACO-IAT-007:
      meaning: Composite landing zone for the current wide manual identity and access control surface
      composed_of:
        - ACO-IAT-001
        - ACO-IAT-002
        - ACO-IAT-003
        - ACO-IAT-004
        - ACO-IAT-005
        - ACO-IAT-006
      usage_rule: >
        May remain a primary target for the broad manual control, but
        requirement-level mappings should prefer atomic objectives when a direct
        semantic fit exists.
mapping_rules:
  control_level:
    rule: Broad manual identity controls may map primarily to composite objectives when they span authentication, authorization, revocation, session and boundary concerns at once
    example:
      source_control_id: CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
      primary_target: ACO-IAT-007
  requirement_level:
    rule: Requirement mappings should prefer atomic objectives when the requirement is semantically narrow
    examples:
      - source_requirement_id: API-001
        primary_target: ACO-IAT-005
        secondary_target: ACO-IAT-001
      - source_requirement_id: AUT-004
        primary_target: ACO-IAT-003
        secondary_target: ACO-IAT-004
  practice_level:
    rule: >
      Current practice mappings are useful but incomplete; the slice still
      starts from requirement and control decomposition rather than from the
      current practice surface.
  many_to_one_allowed: true
  one_to_many_allowed: true
component_subset:
  normalized_practices:
    - ACP-IAT-001
    - ACP-IAT-002
    - ACP-IAT-003
    - ACP-IAT-004
    - ACP-IAT-005
    - ACP-IAT-006
  normalized_mechanisms:
    - ACM-IAT-001
    - ACM-IAT-002
    - ACM-IAT-003
    - ACM-IAT-004
    - ACM-IAT-005
    - ACM-IAT-006
  normalized_artifacts:
    - ACA-IAT-001
    - ACA-IAT-002
    - ACA-IAT-003
    - ACA-IAT-004
    - ACA-IAT-005
    - ACA-IAT-006
evidence_pattern_position:
  current_status: supporting_inside_slice
  meaning: >
    EvidencePattern stays inside the slice for now as a supporting AppSec core
    concept that helps deterministic review semantics, especially around logs,
    access review and policy evidence.
  explicit_boundaries:
    - it_is_not_the_v3_audit_layer
    - it_is_not_yet_split_into_a_separate_verification_module
    - it_is_useful_enough_to_keep_in_the_second_slice_contract
  revisit_trigger: >
    Revisit only after this slice stabilizes and before opening broader
    cross-slice verification semantics.
confidence_boundaries:
  strong_inputs:
    - ontology/sbdtoe-ontology.yaml
    - data/entities/canonical_requirements_s7.json
    - data/entities/canonical_controls.json
    - data/entities/artifact_catalog.json
    - data/publish/semantic/mechanisms.jsonl
  useful_but_weaker_inputs:
    - data/entities/practices.json
  weak_or_deferred_inputs:
    - data/publish/indexes/requirement_control_links.jsonl
    - data/entities/mitigated_threats.json
    - data/publish/semantic/signals.jsonl
  adjacent_but_not_central:
    - CTRL-secrets-gestao-de-segredos-e-identidades-operacionais-e2c86cdfe9
    - sem:mechanism:configuracao-de-oidc-e-ttl-curto-para-segredos
  rule: >
    Normalize this slice requirement-first, use practice and mechanism material
    selectively, and do not let adjacent workload-identity or noisy auto-link
    material redefine the semantic center.
acceptance_read:
  stable_enough_now:
    - the second slice has a coherent objective set
    - the objective set distinguishes atomic and composite semantics
    - the mapping layer encodes the main atomic/composite rule
    - a minimum component subset exists for practices, mechanisms and artifacts
    - the slice records explicit artifact and session-practice gaps instead of hiding them
  not_stable_enough_yet:
    - final session and token practice taxonomy
    - threat modeling for this slice
    - signal-driven slice semantics
    - external alignment for the slice
    - secrets and workload-identity bridging
next_step:
  recommendation: >
    Treat this as the current reference second slice and compare it against the
    first slice to decide which structural rules are truly invariant before
    opening a third AppSec slice.
