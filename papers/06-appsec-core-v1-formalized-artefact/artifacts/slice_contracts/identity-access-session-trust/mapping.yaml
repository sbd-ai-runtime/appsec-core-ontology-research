meta:
  name: AppSec Core Slice Mapping Draft
  version: '0.1'
  status: working_draft
  scope: identity_access_and_session_trust
  description: >
    Draft mapping layer between current SbD-ToE manual controls and requirements
    and the normalized objectives proposed in the identity/access/session trust
    AppSec core slice draft.
  source_manual_ontology: ontology/sbdtoe-ontology.yaml
  target_core_draft: ontology/appsec-core-identity-access-session-trust-draft.yaml
  source_notes:
    - docs/project/working-notes/2026-04-03-appsec-core-slice-identity-access-session-trust.md
mapping_conventions:
  primary:
    meaning: The manual object is mainly explained by this normalized objective
  secondary:
    meaning: The manual object materially contributes to this objective but is not best treated as its main anchor
  composite_target_usage:
    meaning: Composite objectives may be primary landing zones for broad manual control clusters, but requirement-level mappings should prefer atomic objectives when a direct semantic fit exists
  many_to_one_allowed: true
  one_to_many_allowed: true
  current_link_warning:
    meaning: Current autogenerated requirement_control_links are too noisy to drive this slice and remain secondary input only
manual_control_mappings:
  - source_control_id: CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    source_control_name: Gestão de identidades, acessos e ownership
    target_objectives:
      - objective_id: ACO-IAT-007
        strength: primary
        rationale: The current wide identity control spans multiple atomic concerns, so the composite objective is the right primary landing zone at control level
      - objective_id: ACO-IAT-001
        strength: secondary
        rationale: Strong authentication and federated identity support are part of the control surface but not its whole meaning
      - objective_id: ACO-IAT-002
        strength: secondary
        rationale: Least-privilege authorization policy and identity binding are core sub-surfaces of the same control
      - objective_id: ACO-IAT-003
        strength: secondary
        rationale: Access revocation and privilege lifecycle are governed under the same broad control cluster
      - objective_id: ACO-IAT-004
        strength: secondary
        rationale: Session invalidation and token trust are part of the access-control envelope even if not expressed as a dedicated manual control
      - objective_id: ACO-IAT-005
        strength: secondary
        rationale: API and service boundary enforcement depends on the same identity and authorization control surface
      - objective_id: ACO-IAT-006
        strength: secondary
        rationale: Auditability and abuse visibility remain supporting but real sub-surfaces of the wider identity control
manual_requirement_mappings:
  - source_requirement_id: AUT-001
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: MFA obrigatório
    target_objectives:
      - objective_id: ACO-IAT-001
        strength: primary
        rationale: This is the clearest direct anchor for strong authentication assurance
  - source_requirement_id: AUT-003
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Protecção contra brute force
    target_objectives:
      - objective_id: ACO-IAT-001
        strength: primary
        rationale: Brute-force resistance directly hardens the authentication surface
      - objective_id: ACO-IAT-006
        strength: secondary
        rationale: The same requirement also produces abuse signals and blocked-access telemetry
  - source_requirement_id: AUT-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Revogação activa de sessões
    target_objectives:
      - objective_id: ACO-IAT-003
        strength: primary
        rationale: The main meaning is immediate revocation and propagation of access removal
      - objective_id: ACO-IAT-004
        strength: secondary
        rationale: Session invalidation is also part of token and session trust boundaries
  - source_requirement_id: AUT-005
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Expiração automática de sessão
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: This is a direct session lifetime and trust-boundary requirement
  - source_requirement_id: AUT-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Suporte a autenticação federada
    target_objectives:
      - objective_id: ACO-IAT-001
        strength: primary
        rationale: Federation is treated here as a strong-authentication and identity-assurance concern
      - objective_id: ACO-IAT-005
        strength: secondary
        rationale: Federated caller identity also affects service-boundary trust for downstream access decisions
  - source_requirement_id: AUT-008
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Step-up para acções sensíveis
    target_objectives:
      - objective_id: ACO-IAT-001
        strength: primary
        rationale: Step-up is a direct strengthening of authentication assurance for high-risk actions
  - source_requirement_id: AUT-009
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Reautenticação para alterações críticas
    target_objectives:
      - objective_id: ACO-IAT-001
        strength: primary
        rationale: Reauthentication for critical changes is still best treated as identity-assurance hardening
  - source_requirement_id: AUT-010
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Alerta de acessos suspeitos
    target_objectives:
      - objective_id: ACO-IAT-006
        strength: primary
        rationale: Suspicious-access alerting belongs first to the abuse-detection and auditability surface
  - source_requirement_id: ACC-001
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Controlo de acesso RBAC
    target_objectives:
      - objective_id: ACO-IAT-002
        strength: primary
        rationale: RBAC is a direct authorization-model and least-privilege anchor
  - source_requirement_id: ACC-002
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Princípio do menor privilégio
    target_objectives:
      - objective_id: ACO-IAT-002
        strength: primary
        rationale: Least privilege is a defining property of the authorization-policy objective
  - source_requirement_id: ACC-003
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Bloqueio e auditoria de acessos ilegítimos
    target_objectives:
      - objective_id: ACO-IAT-006
        strength: primary
        rationale: This requirement is mainly about denied-access visibility and auditability
      - objective_id: ACO-IAT-005
        strength: secondary
        rationale: Rejection of invalid requests also reinforces boundary enforcement
  - source_requirement_id: ACC-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Separação de perfis
    target_objectives:
      - objective_id: ACO-IAT-002
        strength: primary
        rationale: Role separation is an authorization-model integrity requirement
  - source_requirement_id: ACC-005
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Controlo de acesso a APIs e serviços
    target_objectives:
      - objective_id: ACO-IAT-005
        strength: primary
        rationale: This is the clearest direct service-boundary access-control requirement
      - objective_id: ACO-IAT-002
        strength: secondary
        rationale: The same requirement depends on a sound underlying authorization model
      - objective_id: ACO-IAT-006
        strength: secondary
        rationale: Rejection logging makes auditability part of the same requirement surface
  - source_requirement_id: ACC-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Validação do modelo de acesso
    target_objectives:
      - objective_id: ACO-IAT-002
        strength: primary
        rationale: Validation of the permission model is best treated as authorization-model integrity
  - source_requirement_id: ACC-008
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Revogação em tempo real
    target_objectives:
      - objective_id: ACO-IAT-003
        strength: primary
        rationale: This is the strongest general access-lifecycle anchor for immediate revocation
  - source_requirement_id: ACC-009
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Autorização baseada em atributos (ABAC)
    target_objectives:
      - objective_id: ACO-IAT-002
        strength: primary
        rationale: ABAC is a direct extension of authorization-policy integrity beyond pure RBAC
  - source_requirement_id: ACC-010
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Revisão periódica de permissões
    target_objectives:
      - objective_id: ACO-IAT-003
        strength: primary
        rationale: Periodic permission review belongs first to privilege lifecycle governance
      - objective_id: ACO-IAT-002
        strength: secondary
        rationale: Review of permissions also validates that the authorization model remains correct over time
  - source_requirement_id: SES-003
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Identificadores de sessão imprevisíveis
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: This is a direct session-integrity and anti-predictability requirement
  - source_requirement_id: SES-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Transmissão segura dos tokens
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: Secure token transport is a direct session and token trust requirement
  - source_requirement_id: SES-005
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Ligação da sessão ao contexto do cliente
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: Context-bound sessions belong directly to token and session trust boundaries
  - source_requirement_id: SES-006
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Revogação explícita da sessão
    target_objectives:
      - objective_id: ACO-IAT-003
        strength: primary
        rationale: Explicit session revocation is best treated as access-lifecycle and revocation integrity
      - objective_id: ACO-IAT-004
        strength: secondary
        rationale: It also contributes to bounded and trustworthy session state
  - source_requirement_id: SES-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Prevenção de sessões long-lived
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: Session lifetime bounds are a direct token and session trust concern
  - source_requirement_id: SES-008
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Scope, TTL e revogação de tokens JWT
    target_objectives:
      - objective_id: ACO-IAT-004
        strength: primary
        rationale: Scope and TTL semantics are best treated as token trust boundaries
      - objective_id: ACO-IAT-003
        strength: secondary
        rationale: Revocation mechanics also contribute materially to access-lifecycle integrity
  - source_requirement_id: API-001
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Autenticação e autorização de chamadas API
    target_objectives:
      - objective_id: ACO-IAT-005
        strength: primary
        rationale: This is the clearest direct anchor for authenticated and authorized API boundary enforcement
      - objective_id: ACO-IAT-001
        strength: secondary
        rationale: Caller authentication still depends on the strength of the underlying identity assurance surface
  - source_requirement_id: API-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Rate limiting e detecção de abusos
    target_objectives:
      - objective_id: ACO-IAT-006
        strength: primary
        rationale: Rate limiting and abuse detection belong first to the observability and anti-abuse surface
      - objective_id: ACO-IAT-005
        strength: secondary
        rationale: The same controls are commonly enforced at the API and service boundary
  - source_requirement_id: API-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Logging e auditoria de chamadas externas
    target_objectives:
      - objective_id: ACO-IAT-006
        strength: primary
        rationale: This is the main external-call auditability requirement for the slice
bridge_only_observations:
  - source_reference: CTRL-secrets-gestao-de-segredos-e-identidades-operacionais-e2c86cdfe9
    note: >
      Operational identities, OIDC-based workload identity and short-lived
      credentials are adjacent to this slice, but remain intentionally outside
      the current mapping draft so that secrets/workload identity does not
      dominate the semantic center too early.
open_questions:
  - Should `AUT-007` remain under `ACO-IAT-001`, or later split an external-identity-integration objective out of this slice?
  - Should `ACO-IAT-003` and `ACO-IAT-004` stay distinct, or converge if the slice later adopts a more token-centric boundary model?
  - Should `API-004` remain fully inside `ACO-IAT-006`, or later split between observability and active gateway enforcement?
  - When the manual control surface becomes less broad, should `ACO-IAT-007` remain a composite `ControlObjective`, or move to a higher-level type such as `Capability`?
