notes:
  practice_surface_strength:
    note: >
      This slice is practice-strong enough to stand apart from the broader
      secure-development umbrella, but some practices remain more generic than
      the narrower reusable slice semantics.
  mechanism_surface_limit:
    note: >
      The current semantic mechanism catalog is weaker than the requirements,
      practices and evidence-pattern surfaces for this slice, so several
      mechanisms stay explicitly objective-led.
  testing_boundary:
    note: >
      Test reports and adversarial input checks support the slice, but testing
      governance remains primarily in the testing slice rather than here.
open_questions:
  - Should `ACP-IVF-004` later split internal business-use validation from downstream integration validation if a broader integration slice emerges?
  - Which future mechanism should become the primary anchor for schema and parser discipline once the semantic mechanism catalog grows?
  - Should `ACA-IVF-006` remain inside this slice as an error-log artifact, or later share part of its role with a future observability slice without collapsing into runtime semantics?
