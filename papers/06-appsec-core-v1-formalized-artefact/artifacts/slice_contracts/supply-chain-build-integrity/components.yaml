open_questions:
  - Should `Build And Image Inventory Generation` stay one mechanism, or split into dependency inventory versus image inventory?
  - Should `Trusted Container Image Supply` remain a direct practice target, or later be treated only as a composite envelope over narrower practices?
  - Should `Release Gate` and `Approval Record` remain separate normalized artifacts or collapse into a single governance artifact family?
  - Which current image-runtime practices should remain outside this slice because they are really runtime hardening rather than supply integrity?
