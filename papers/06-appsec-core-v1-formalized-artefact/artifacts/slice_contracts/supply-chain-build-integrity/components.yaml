meta:
  name: AppSec Core Slice Components Draft
  version: '0.1'
  status: working_draft
  scope: supply_chain_and_build_integrity
  description: >
    Minimal normalized subset of practices, mechanisms and artifacts used to
    validate the AppSec core slice draft for supply chain and build integrity.
  target_core_draft: ontology/appsec-core-supply-chain-build-integrity-draft.yaml
  target_mapping_draft: ontology/appsec-core-supply-chain-build-integrity-mapping-draft.yaml
normalized_practices:
  ACP-SCBI-001:
    name: Build-Linked SBOM Generation
    practice_family: integrity_traceability_and_records
    local_practice_type: inventory
    supports_objectives:
      - ACO-SCBI-001
    description: Generate and retain SBOMs as first-class outputs of build or image publication flows
  ACP-SCBI-002:
    name: Automated Dependency And Image Risk Gating
    practice_family: validation_and_analysis
    local_practice_type: verification
    supports_objectives:
      - ACO-SCBI-002
    description: Run automated composition and vulnerability checks and use them as promotion gates
  ACP-SCBI-003:
    name: Approved Source And Registry Governance
    practice_family: policy_and_gate_enforcement
    local_practice_type: approval
    supports_objectives:
      - ACO-SCBI-003
      - ACO-SCBI-007
    description: Limit acquisition and promotion to approved repositories, registries and trusted base-image sources
  ACP-SCBI-004:
    name: Pipeline Definition As Reviewed Code
    practice_family: governance_and_review
    local_practice_type: build
    supports_objectives:
      - ACO-SCBI-004
    description: Keep build and release logic versioned, reviewable and deterministic
  ACP-SCBI-005:
    name: Governed Promotion And Release Approval
    practice_family: policy_and_gate_enforcement
    local_practice_type: approval
    supports_objectives:
      - ACO-SCBI-005
    description: Separate security signal generation from approval decisions and enforce explicit release gates
  ACP-SCBI-006:
    name: Artifact Signature And Provenance Validation
    practice_family: integrity_traceability_and_records
    local_practice_type: attestation
    supports_objectives:
      - ACO-SCBI-006
      - ACO-SCBI-007
    description: Attach and verify signature, attestation and provenance evidence for produced artifacts and images
  ACP-SCBI-007:
    name: Trusted Container Image Supply
    practice_family: policy_and_gate_enforcement
    local_practice_type: approval
    supports_objectives:
      - ACO-SCBI-007
    description: Build, select and promote images only through trusted, traceable and policy-governed supply paths
normalized_mechanisms:
  ACM-SCBI-001:
    name: Versioned Pipelines
    mechanism_family: governance_and_review
    local_mechanism_type: workflow
    source_semantic_ids:
      - sem:mechanism:versionamento-de-pipelines
    supports_practices:
      - ACP-SCBI-004
  ACM-SCBI-002:
    name: Automated Security Scanners
    mechanism_family: validation_and_analysis
    local_mechanism_type: automation
    source_semantic_ids:
      - sem:mechanism:scanners-automaticos
      - sem:mechanism:integracao-de-scanners-servicos-repositorios-registries
    supports_practices:
      - ACP-SCBI-002
      - ACP-SCBI-007
  ACM-SCBI-003:
    name: Release Promotion Gates
    mechanism_family: policy_and_gate_enforcement
    local_mechanism_type: policy
    source_semantic_ids:
      - sem:mechanism:promocao-de-releases
      - sem:pattern:separacao-entre-sinal-automatico-e-decisao-de-promocao
    supports_practices:
      - ACP-SCBI-005
  ACM-SCBI-004:
    name: Artifact Signing And Attestation
    mechanism_family: integrity_traceability_and_records
    local_mechanism_type: attestation
    source_semantic_ids:
      - sem:mechanism:assinatura-de-artefactos
    supports_practices:
      - ACP-SCBI-006
  ACM-SCBI-005:
    name: Build And Image Inventory Generation
    mechanism_family: integrity_traceability_and_records
    local_mechanism_type: inventory
    source_semantic_ids: []
    supports_practices:
      - ACP-SCBI-001
      - ACP-SCBI-007
    note: >
      This mechanism is visible in current manual practices and artifacts, but it
      is not yet strongly represented in the semantic-layer mechanism catalog.
  ACM-SCBI-006:
    name: Registry Allowlisting And Approved Source Enforcement
    mechanism_family: policy_and_gate_enforcement
    local_mechanism_type: source_enforcement
    supports_practices:
      - ACP-SCBI-003
    note: >
      Technical controls that restrict dependency and image acquisition
      to approved repositories and registries. Includes registry proxy
      with allowlisting, Kubernetes admission controllers that reject
      unapproved images, package manager configuration for approved sources.
      Tools: Artifactory/Nexus proxy, OPA/Gatekeeper admission policies.
