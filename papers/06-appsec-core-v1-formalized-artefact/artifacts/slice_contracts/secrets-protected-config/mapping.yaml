meta:
  name: AppSec Core Slice Mapping Draft
  version: '0.1'
  status: working_draft
  scope: secret_handling_protected_configuration_and_operational_identities
  description: >
    Draft mapping layer between current SbD-ToE manual controls and requirements
    and the normalized objectives proposed in the secrets/protected-config
    AppSec core slice draft.
  source_manual_ontology: ontology/sbdtoe-ontology.yaml
  target_core_draft: ontology/appsec-core-secrets-protected-config-draft.yaml
  source_notes:
    - docs/project/working-notes/2026-04-03-appsec-core-slice-6-candidate-evaluation.md
    - docs/project/working-notes/2026-04-03-appsec-core-slice-secrets-protected-config.md
mapping_conventions:
  primary:
    meaning: The manual object is mainly explained by this normalized objective
  secondary:
    meaning: The manual object materially contributes to this objective but is not best treated as its main anchor
  composite_target_usage:
    meaning: Composite objectives may be primary landing zones for broad manual control clusters, but requirement-level mappings should prefer atomic objectives when a direct semantic fit exists
  many_to_one_allowed: true
  one_to_many_allowed: true
  crypto_boundary_warning:
    meaning: The slice models secret handling and operational identity semantics, not the whole cryptography domain
manual_control_mappings:
  - source_control_id: CTRL-secrets-gestao-de-segredos-e-identidades-operacionais-e2c86cdfe9
    source_control_name: Gestao de segredos e identidades operacionais
    target_objectives:
      - objective_id: ACO-SPC-007
        strength: primary
        rationale: The current secrets control is broad enough to require a composite landing zone at control level
      - objective_id: ACO-SPC-001
        strength: secondary
        rationale: Secret leak prevention is one direct sub-surface of the broader control
      - objective_id: ACO-SPC-002
        strength: secondary
        rationale: Protected storage and controlled retrieval are central to the control's meaning
      - objective_id: ACO-SPC-003
        strength: secondary
        rationale: Rotation and expiry discipline are part of the same secret-governance envelope
      - objective_id: ACO-SPC-004
        strength: secondary
        rationale: Operational identity and short-lived credentials are one of the clearest direct semantics of the control
      - objective_id: ACO-SPC-005
        strength: secondary
        rationale: Secret usage isolation across pipeline, workload and deploy surfaces belongs inside the same control cluster
      - objective_id: ACO-SPC-006
        strength: secondary
        rationale: Secret-change governance and auditability are the control's main governance outcome
manual_requirement_mappings:
  - source_requirement_id: ENC-006
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Deteccao e prevencao de segredos expostos em repositorios
    target_objectives:
      - objective_id: ACO-SPC-001
        strength: primary
        rationale: This is the strongest direct anchor for secret leak prevention and hardcoded-secret exclusion
  - source_requirement_id: ENC-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Rotacao periodica de chaves e segredos
    target_objectives:
      - objective_id: ACO-SPC-003
        strength: primary
        rationale: Rotation cadence and expiry discipline are the direct semantic center of this requirement
      - objective_id: ACO-SPC-006
        strength: secondary
        rationale: Rotation also materially contributes to secret-change governance and auditability
  - source_requirement_id: CFG-003
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Ausencia de parametros hardcoded
    target_objectives:
      - objective_id: ACO-SPC-001
        strength: primary
        rationale: This is a direct anti-hardcoding requirement for secret leak prevention
  - source_requirement_id: CFG-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Configuracao externa com permissoes controladas
    target_objectives:
      - objective_id: ACO-SPC-002
        strength: primary
        rationale: The requirement is mainly about controlled externalized secret-bearing configuration
      - objective_id: ACO-SPC-005
        strength: secondary
        rationale: Controlled permissions also materially support separation of secret usage surfaces
  - source_requirement_id: CFG-006
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Uso de cofres e gestao segura de segredos
    target_objectives:
      - objective_id: ACO-SPC-002
        strength: primary
        rationale: This is the strongest direct anchor for vault-backed secret storage and retrieval discipline
      - objective_id: ACO-SPC-005
        strength: secondary
        rationale: Vault use also supports secret isolation across technical surfaces
  - source_requirement_id: DPL-006
    source_bundle: 11-deploy-seguro
    source_requirement_name: Credenciais de deploy com ambito minimo e vida curta
    target_objectives:
      - objective_id: ACO-SPC-004
        strength: primary
        rationale: Short-lived deploy credentials and minimum scope belong first to operational identity semantics
      - objective_id: ACO-SPC-005
        strength: secondary
        rationale: This also materially reinforces isolation between deploy surfaces and broader secret usage
bridge_only_observations:
  - source_reference: ENC-002
    note: >
      Encryption of sensitive data at rest is an important adjacent surface, but
      it belongs to a broader cryptography/data-protection space than this
      secrets slice.
  - source_reference: ENC-003
    note: >
      Approved cryptographic primitives are adjacent to secret handling, but
      they should not redefine this slice into a generic cryptography model.
  - source_reference: CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    note: >
      End-user identity and access remain a strong adjacency, but this slice is
      about operational identity binding and secret use, not about user/session
      authorization.
  - source_reference: CTRL-infrastructure-deploy-seguro-e-reversivel-ae204be5f0
    note: >
      Deploy surfaces remain an important consumer of this slice, but deploy
      governance as such is not the semantic center here.
open_questions:
  - Should `CFG-004` remain inside protected storage, or later split externalized protected configuration from vault-backed secret storage?
  - Should `DPL-006` remain the main operational-identity anchor, or later gain stronger companion anchors from workload-identity practices once the slice matures?
  - At what point should broader cryptography concerns become their own slice rather than remaining bridge-only to secret handling?
  - Which future artifact should become the primary anchor for secret scanning and rotation evidence once the artifact taxonomy expands?
