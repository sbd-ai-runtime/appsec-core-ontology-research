notes:
  practice_surface_strength:
    note: >
      This slice has a stronger chapter-local practice surface than slices 2
      and 3, so the normalized practice subset can be slightly richer without
      becoming speculative.
  v3_boundary:
    note: >
      Findings history, persistent audit state and operational response remain
      outside this slice even though findings triage and retest closure are
      included as testing-governance semantics.
  mechanism_surface_limit:
    note: >
      The current semantic mechanism catalog is still weaker than the practice
      and artifact surfaces for testing, so some mechanisms stay partially
      objective-led.
open_questions:
  - Should `ACP-TSV-007` remain separate from `ACP-TSV-005`, or later collapse into one broader release-decision practice?
  - Should `ACM-TSV-004` wait for stronger semantic grounding before being treated as stable?
  - Which future artifact should become the primary anchor for exception handling and retest closure once the artifact taxonomy expands?
  - Should `ACA-TSV-001` and `ACA-TSV-002` remain distinct report families, or later merge into a broader security-test evidence family?
