meta:
  name: AppSec Core Slice Components Draft
  version: '0.1'
  status: working_draft
  scope: testing_security_validation_and_empirical_assurance
  description: >
    Minimal normalized subset of practices, mechanisms and artifacts used to
    validate the AppSec core slice draft for testing, security validation and
    empirical assurance.
  target_core_draft: ontology/appsec-core-testing-security-validation-draft.yaml
  target_mapping_draft: ontology/appsec-core-testing-security-validation-mapping-draft.yaml
normalized_practices:
  ACP-TSV-001:
    name: Risk-Based Security Test Planning
    practice_family: governance_and_review
    local_practice_type: strategy
    supports_objectives:
      - ACO-TSV-001
    description: Define testing scope, frequency, owners and coverage thresholds by application risk and critical surface
  ACP-TSV-002:
    name: Governed Static Analysis Execution
    practice_family: validation_and_analysis
    local_practice_type: static_analysis
    supports_objectives:
      - ACO-TSV-002
      - ACO-TSV-007
    description: Run static analysis with managed rule profiles, controlled noise and explicit critical-surface coverage expectations
  ACP-TSV-003:
    name: Findings Triage, SLA And Retest Closure
    practice_family: governance_and_review
    local_practice_type: finding_governance
    supports_objectives:
      - ACO-TSV-003
      - ACO-TSV-007
    description: Triage testing findings, track them to correction and close them only through retest or formal exception
  ACP-TSV-004:
    name: Reproducible Test Evidence Management
    practice_family: integrity_traceability_and_records
    local_practice_type: evidence_management
    supports_objectives:
      - ACO-TSV-004
      - ACO-TSV-007
    description: Keep reports, execution context and build linkage reproducible enough for later review and audit
  ACP-TSV-005:
    name: Staged Dynamic Testing And Gate Enforcement
    practice_family: validation_and_analysis
    local_practice_type: dynamic_testing
    supports_objectives:
      - ACO-TSV-005
      - ACO-TSV-007
    description: Run dynamic security testing in staging and connect its outcomes to explicit promotion gates
  ACP-TSV-006:
    name: Specialized Empirical Testing
    practice_family: validation_and_analysis
    local_practice_type: specialized_testing
    supports_objectives:
      - ACO-TSV-006
      - ACO-TSV-007
    description: Apply regression tests, offensive testing and fuzzing where deeper empirical validation is justified
  ACP-TSV-007:
    name: Human Review Of Security Test Signals
    practice_family: governance_and_review
    local_practice_type: release_decision
    supports_objectives:
      - ACO-TSV-003
      - ACO-TSV-005
      - ACO-TSV-007
    description: Separate raw automated signal from final release or correction decision through explicit human review and acceptance criteria
normalized_mechanisms:
  ACM-TSV-001:
    name: Integrated Security Scanners
    mechanism_family: validation_and_analysis
    local_mechanism_type: scanner
    source_semantic_ids:
      - sem:mechanism:scanners-de-seguranca-integrados
      - sem:mechanism:scanners-automaticos
    supports_practices:
      - ACP-TSV-002
      - ACP-TSV-005
      - ACP-TSV-006
  ACM-TSV-002:
    name: Test Execution Surfaces
    mechanism_family: validation_and_analysis
    local_mechanism_type: test_orchestrator
    source_semantic_ids:
      - sem:mechanism:testes
    supports_practices:
      - ACP-TSV-005
      - ACP-TSV-006
  ACM-TSV-003:
    name: CI/CD Gate And Release Promotion
    mechanism_family: policy_and_gate_enforcement
    local_mechanism_type: gate
    source_semantic_ids:
      - sem:mechanism:pipelines-ci-cd
      - sem:mechanism:promocao-de-releases
    supports_practices:
      - ACP-TSV-001
      - ACP-TSV-004
      - ACP-TSV-005
      - ACP-TSV-007
  ACM-TSV-004:
    name: Findings Workflow And Exception Governance
    mechanism_family: governance_and_review
    local_mechanism_type: triage_workflow
    source_semantic_ids: []
    supports_practices:
      - ACP-TSV-003
      - ACP-TSV-007
    note: >
      The repo clearly expresses findings triage, exception handling and
      decision review in requirements and practices, but not yet as a clean
      semantic mechanism family.
  ACM-TSV-005:
    name: Static Analysis Profile Management
    mechanism_family: validation_and_analysis
    local_mechanism_type: baseline
    source_semantic_ids:
      - sem:mechanism:scanners-obrigatorios
    supports_practices:
      - ACP-TSV-002
    note: >
      This anchor is narrower than the full problem of baseline governance and
      false-positive management, but it is the closest current semantic fit.
