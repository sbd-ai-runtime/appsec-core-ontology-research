meta:
  name: AppSec Core Slice Mapping Draft
  version: '0.1'
  status: working_draft
  scope: architecture_and_trust_boundaries
  description: >
    Draft mapping layer between current SbD-ToE manual controls and requirements
    and the normalized objectives proposed in the architecture/trust-boundaries
    AppSec core slice draft.
  source_manual_ontology: ontology/sbdtoe-ontology.yaml
  target_core_draft: ontology/appsec-core-architecture-trust-boundaries-draft.yaml
  source_notes:
    - docs/project/working-notes/2026-04-03-appsec-core-slice-architecture-trust-boundaries.md
mapping_conventions:
  primary:
    meaning: The manual object is mainly explained by this normalized objective
  secondary:
    meaning: The manual object materially contributes to this objective but is not best treated as its main anchor
  composite_target_usage:
    meaning: Composite objectives may be primary landing zones for broad manual control clusters, but requirement-level mappings should prefer atomic objectives when a direct semantic fit exists
  many_to_one_allowed: true
  one_to_many_allowed: true
  current_link_warning:
    meaning: Current autogenerated requirement_control_links are too noisy to drive this slice and remain secondary input only
manual_control_mappings:
  - source_control_id: CTRL-governance-arquitetura-segura-e-rastreavel-74562442c4
    source_control_name: Arquitetura segura e rastreável
    target_objectives:
      - objective_id: ACO-ATB-007
        strength: primary
        rationale: The current architecture governance control is broad enough to need a composite landing zone at control level
      - objective_id: ACO-ATB-001
        strength: secondary
        rationale: Baseline definition, ADR discipline and reusable patterns are direct sub-surfaces of the broader control
      - objective_id: ACO-ATB-002
        strength: secondary
        rationale: Trust-boundary clarity and protected flows are part of the same architecture governance envelope
      - objective_id: ACO-ATB-003
        strength: secondary
        rationale: External exposure justification belongs inside secure architecture governance even if it is narrower than the whole control
      - objective_id: ACO-ATB-004
        strength: secondary
        rationale: Technical segmentation between sensitive domains is one of the control's concrete architecture outcomes
      - objective_id: ACO-ATB-005
        strength: secondary
        rationale: Formal review, go-live gates and change-trigger discipline are a strong part of the control's meaning
      - objective_id: ACO-ATB-006
        strength: secondary
        rationale: Automatable topology validation is part of the same architecture-governance cluster when applicable
  - source_control_id: CTRL-infrastructure-segmentacao-e-controlo-arquitetural-dceb3c1f0b
    source_control_name: Segmentação e controlo arquitetural
    target_objectives:
      - objective_id: ACO-ATB-002
        strength: primary
        rationale: The clearest direct meaning is explicit trust boundaries and protected flows across architecture zones
      - objective_id: ACO-ATB-004
        strength: primary
        rationale: The control also directly anchors technical segmentation and sensitive-domain isolation
      - objective_id: ACO-ATB-003
        strength: secondary
        rationale: Boundary mediation and justified external exposure are adjacent but narrower than the full control
manual_requirement_mappings:
  - source_requirement_id: ARC-001
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Zonas de confiança identificadas e documentadas
    target_objectives:
      - objective_id: ACO-ATB-002
        strength: primary
        rationale: This is the clearest direct trust-boundary identification requirement
  - source_requirement_id: ARC-002
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Exposição externa minimizada e justificada
    target_objectives:
      - objective_id: ACO-ATB-003
        strength: primary
        rationale: The requirement is directly about justified external exposure and mediation controls
  - source_requirement_id: ARC-003
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Revisão de arquitectura com foco em segurança
    target_objectives:
      - objective_id: ACO-ATB-005
        strength: primary
        rationale: This is the main architecture-review and review-record requirement for the slice
  - source_requirement_id: ARC-004
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Decisões de arquitectura documentadas
    target_objectives:
      - objective_id: ACO-ATB-001
        strength: primary
        rationale: ADR and architectural decision traceability are the semantic center of this requirement
  - source_requirement_id: ARC-006
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Controlos técnicos de isolamento entre domínios sensíveis
    target_objectives:
      - objective_id: ACO-ATB-004
        strength: primary
        rationale: Technical isolation between sensitive domains is the clearest direct segmentation requirement
      - objective_id: ACO-ATB-002
        strength: secondary
        rationale: Sensitive-domain isolation also depends on clear trust-boundary definition
  - source_requirement_id: ARC-007
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Padrões de arquitectura reutilizáveis e aprovados
    target_objectives:
      - objective_id: ACO-ATB-001
        strength: primary
        rationale: Approved reusable architecture patterns belong first to baseline and decision traceability
      - objective_id: ACO-ATB-006
        strength: secondary
        rationale: Pattern conformance can later be validated automatically against this approved pattern surface
  - source_requirement_id: ARC-008
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Fluxos de dados entre zonas de confiança protegidos
    target_objectives:
      - objective_id: ACO-ATB-002
        strength: primary
        rationale: Protected data flows across trust boundaries are the direct semantic center here
      - objective_id: ACO-ATB-004
        strength: secondary
        rationale: Some of the required controls also contribute to technical isolation and segmentation
  - source_requirement_id: ARC-009
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Alterações significativas desencadeiam nova revisão
    target_objectives:
      - objective_id: ACO-ATB-005
        strength: primary
        rationale: This is the clearest change-trigger discipline requirement for the slice
  - source_requirement_id: ARC-010
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Diagramas de arquitectura versionados e acessíveis
    target_objectives:
      - objective_id: ACO-ATB-001
        strength: primary
        rationale: Versioned and accessible architecture diagrams are part of the baseline traceability surface
      - objective_id: ACO-ATB-002
        strength: secondary
        rationale: Diagram quality also supports trust-boundary clarity and protected-flow review
  - source_requirement_id: ARC-011
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Segmentação lógica e física entre ambientes
    target_objectives:
      - objective_id: ACO-ATB-004
        strength: primary
        rationale: This is a direct environment-segmentation and isolation requirement
  - source_requirement_id: ARC-012
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Critérios formais de aprovação para aplicações de risco elevado
    target_objectives:
      - objective_id: ACO-ATB-005
        strength: primary
        rationale: Formal architecture approval criteria belong directly to the review and change-trigger discipline surface
  - source_requirement_id: ARC-013
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Validação automática de topologia em CI/CD ou como código
    target_objectives:
      - objective_id: ACO-ATB-006
        strength: primary
        rationale: This is the strongest direct anchor for automatable topology validation
bridge_only_observations:
  - source_reference: ARC-005
    note: >
      Threat modeling integrated into critical flows is strongly adjacent to this
      slice, but it is not treated as a primary mapping anchor here because the
      slice is about architecture and trust-boundary semantics, not about threat
      modeling as its own domain surface.
  - source_reference: CTRL-governance-threat-modeling-e-gestao-de-risco-272c9a8ed0
    note: >
      This control is a useful bridge into architecture review and trust-boundary
      reasoning, but remains outside the primary mapping layer so that threat
      modeling does not colonize the slice too early.
  - source_reference: CTRL-infrastructure-infraestrutura-como-codigo-governada-5228bca905
    note: >
      IaC validation and topology checks are adjacent to the topology-validation
      objective, but this slice should keep design-time architecture semantics
      ahead of infrastructure execution semantics.
open_questions:
  - Should `ARC-010` remain mainly inside baseline traceability, or later split diagram versioning from decision traceability?
  - Should `ACO-ATB-003` remain separate from `ACO-ATB-004`, or converge if later slices show that exposure mediation and technical segmentation are inseparable in practice?
  - Should `ARC-005` remain bridge-only, or later map secondarily into trust-boundary and review objectives once the relationship between architecture and threat modeling is modeled more explicitly?
  - Should `ACO-ATB-006` remain inside the architecture slice, or later become a cross-slice validation capability?
