  - source_practice_id: 04-arquitetura-segura:validacao-arquitetural-automatizavel-no-ci-cd-quando-aplicavel
    target_practice_id: ACP-ATB-007
notes:
  artifact_surface_limit:
    note: >
      The architecture slice is stronger at control-level artifact typing than
      at current artifact-catalog materialization. Several architecture-specific
      artifacts remain open gaps in the objective draft and are not forced into
      this components draft.
  bridge_boundary:
    note: >
      Threat-modeling and IaC remain bridge-only surfaces and are not promoted
      here as the main practice or mechanism anchors for the slice.
open_questions:
  - Should `ACP-ATB-004` remain about exposure and mediation only, or later merge with trust-boundary review?
  - Should `ACP-ATB-006` stay separate from `ACP-ATB-005`, or collapse into one broader architecture-review governance practice?
  - Which future artifact should become the primary anchor for trust-boundary models and DFDs once the artifact catalog is expanded?
  - Should `ACM-ATB-005` eventually move to a more generic validation capability shared with other slices?
