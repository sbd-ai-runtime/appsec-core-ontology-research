  - source_practice_id: 04-arquitetura-segura:definicao-de-principios-e-baseline-de-arquitetura-segura
    target_practice_id: ACP-ATB-001
  - source_practice_id: 04-arquitetura-segura:gestao-de-decisoes-arquiteturais-adr
    target_practice_id: ACP-ATB-002
  - source_practice_id: 04-arquitetura-segura:ficha-de-solucao-com-controlos-e-rastreabilidade-arquitetural
