meta:
  name: AppSec Core Slice Mapping Draft
  version: '0.1'
  status: working_draft
  scope: integration_trust_and_service_to_service_security
  description: >
    Draft mapping layer between current SbD-ToE manual controls and requirements
    and the normalized objectives proposed in the integration-trust and
    service-to-service security AppSec core slice draft.
  source_manual_ontology: ontology/sbdtoe-ontology.yaml
  target_core_draft: ontology/appsec-core-integration-trust-service-security-draft.yaml
  source_notes:
    - docs/project/working-notes/2026-04-03-appsec-core-slice-8-candidate-evaluation.md
    - docs/project/working-notes/2026-04-03-appsec-core-slice-integration-trust-service-security.md
mapping_conventions:
  primary:
    meaning: The manual object is mainly explained by this normalized objective
  secondary:
    meaning: The manual object materially contributes to this objective but is not best treated as its main anchor
  composite_target_usage:
    meaning: Composite objectives may be primary landing zones for broad manual control clusters, but requirement-level mappings should prefer atomic objectives when a direct semantic fit exists
  many_to_one_allowed: true
  one_to_many_allowed: true
  slice_boundary_warning:
    meaning: The slice models trusted interaction between services and systems, not end-user IAM, not full architecture governance and not full observability
manual_control_mappings:
  - source_control_id: CTRL-infrastructure-segmentacao-e-controlo-arquitetural-dceb3c1f0b
    source_control_name: Segmentacao e controlo arquitetural
    target_objectives:
      - objective_id: ACO-ITS-007
        strength: primary
        rationale: The current technical boundary control is the clearest broad landing zone for the interaction-trust slice as a whole
      - objective_id: ACO-ITS-001
        strength: secondary
        rationale: Boundary control materially includes trusted peer access at service boundaries
      - objective_id: ACO-ITS-004
        strength: secondary
        rationale: Exposure mediation and controlled integration paths are a direct technical meaning of the control
      - objective_id: ACO-ITS-005
        strength: secondary
        rationale: Integration review remains part of the same broad architecture-controlled surface
  - source_control_id: CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    source_control_name: Gestao de identidades acessos e ownership
    target_objectives:
      - objective_id: ACO-ITS-001
        strength: primary
        rationale: Machine identity binding and authenticated peer trust are the clearest interaction-facing sub-surface of the broader identity control
      - objective_id: ACO-ITS-003
        strength: secondary
        rationale: Authorized origin and destination handling materially depends on trusted identity and peer authorization semantics
      - objective_id: ACO-ITS-007
        strength: secondary
        rationale: The broader interaction-trust surface still depends on adjacent identity control even though this slice is not the end-user IAM slice
  - source_control_id: CTRL-governance-arquitetura-segura-e-rastreavel-74562442c4
    source_control_name: Arquitetura segura e rastreavel
    target_objectives:
      - objective_id: ACO-ITS-005
        strength: primary
        rationale: Explicit integration review and contractual assurance are architecture-governance heavy even when the slice remains technically centered
      - objective_id: ACO-ITS-004
        strength: secondary
        rationale: External exposure and integration-path control still depend on architectural reviewable justification
      - objective_id: ACO-ITS-007
        strength: secondary
        rationale: The slice uses architecture governance as a supporting broad anchor without letting it redefine the center
manual_requirement_mappings:
  - source_requirement_id: API-001
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Autenticacao e autorizacao de chamadas API
    target_objectives:
      - objective_id: ACO-ITS-001
        strength: primary
        rationale: In this slice the requirement is read as trusted machine interaction at the service boundary, not as the full end-user identity surface
  - source_requirement_id: API-002
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Endpoints desnecessarios removidos ou ocultos
    target_objectives:
      - objective_id: ACO-ITS-004
        strength: primary
        rationale: Endpoint exposure minimization is the clearest direct anchor for controlling integration paths and mediated boundary exposure
  - source_requirement_id: API-005
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Proteccao por TLS e certificados actualizados
    target_objectives:
      - objective_id: ACO-ITS-002
        strength: primary
        rationale: This is the strongest API-facing anchor for secure transport and certificate hygiene across interactions
  - source_requirement_id: API-007
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Logging e auditoria de chamadas externas
    target_objectives:
      - objective_id: ACO-ITS-006
        strength: primary
        rationale: This requirement directly anchors interaction auditability without requiring the whole monitoring stack to define the slice
  - source_requirement_id: INT-002
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Autenticacao mutua ou tokens seguros
    target_objectives:
      - objective_id: ACO-ITS-001
        strength: primary
        rationale: Mutual authentication and secure tokens are the clearest direct anchors for trusted peer identity at interaction boundaries
  - source_requirement_id: INT-003
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Transmissao cifrada com TLS
    target_objectives:
      - objective_id: ACO-ITS-002
        strength: primary
        rationale: This is a direct integration-facing anchor for encrypted service transport
  - source_requirement_id: INT-004
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Proibicao de protocolos inseguros
    target_objectives:
      - objective_id: ACO-ITS-002
        strength: primary
        rationale: Explicit rejection of insecure protocols belongs directly to transport and protocol hygiene
  - source_requirement_id: INT-005
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Assinatura e integridade de mensagens
    target_objectives:
      - objective_id: ACO-ITS-003
        strength: primary
        rationale: Message signature and integrity verification are the direct semantic center here
  - source_requirement_id: INT-006
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Validacao cruzada de origem e destino
    target_objectives:
      - objective_id: ACO-ITS-003
        strength: primary
        rationale: Explicit authorized origin and destination control is the clearest peer-authorization anchor in the slice
  - source_requirement_id: INT-008
    source_bundle: 02-requisitos-seguranca
    source_requirement_name: Revisao de seguranca e contrato em integracoes
    target_objectives:
      - objective_id: ACO-ITS-005
        strength: primary
        rationale: This requirement is directly about integration review and contractual security assurance
      - objective_id: ACO-ITS-004
        strength: secondary
        rationale: The same review also materially reinforces exposure and integration-path control
  - source_requirement_id: ARC-002
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Exposicao externa minimizada e justificada
    target_objectives:
      - objective_id: ACO-ITS-004
        strength: primary
        rationale: This companion architecture requirement directly grounds boundary-mediated exposure control for integrations
  - source_requirement_id: ARC-006
    source_bundle: 04-arquitetura-segura
    source_requirement_name: Controlos tecnicos de isolamento entre dominios sensiveis
    target_objectives:
      - objective_id: ACO-ITS-004
        strength: primary
        rationale: This companion architecture requirement provides the clearest technical isolation anchor for controlled integration paths
bridge_only_observations:
  - source_reference: INT-007
    note: >
      Anomalous integration-pattern detection is useful, but it belongs more to
      a future observability slice than to the current interaction-trust
      semantic center.
  - source_reference: API-004
    note: >
      Rate limiting and abuse detection remain important adjacent API-boundary
      semantics, but they fit better in identity or future API-governance
      surfaces than in this slice.
  - source_reference: CTRL-monitoring-monitorizacao-e-resposta-operacional-1797f0af70
    note: >
      Interaction auditability uses logging as supporting evidence, but the
      slice should not drift into full monitoring, correlation or incident
      response semantics.
  - source_reference: CTRL-code-integrity-desenvolvimento-seguro-e-validacao-de-codigo-63dedd7460
    note: >
      The generated requirement-control surface currently over-maps several
      `API-*` and `INT-*` requirements here, but that auto-linking is not the
      correct semantic center for this slice.
  - source_reference: ontology/appsec-core-identity-access-session-trust-slice-contract.yaml
    note: >
      `API-001` overlaps with the identity slice, but here it is read narrowly
      as trusted machine interaction rather than as the full identity and
      access-control domain.
open_questions:
  - Should future machine-identity taxonomy separate mutual-auth configuration from bounded service-token policy once the mechanism catalog is richer?
  - Should `ARC-002` and `ARC-006` remain companion anchors only, or later become part of a stronger shared interaction-boundary module between architecture and integration trust?
  - Which future artifact should become the primary anchor for interface security clauses and integration review records once the artifact taxonomy expands?
  - Should external interaction auditability remain fully inside this slice, or later share part of its role with a future observability slice without collapsing into `V3`?
