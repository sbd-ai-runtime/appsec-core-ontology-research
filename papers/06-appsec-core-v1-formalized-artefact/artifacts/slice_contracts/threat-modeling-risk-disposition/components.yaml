notes:
  mechanism_surface_strength:
    note: >
      The threat-modeling slice has a better current mechanism surface than it
      first appeared to have, because the `03-threat-modeling` bundle already
      materializes method and governance-oriented mechanism entries.
  threat_boundary:
    note: >
      This slice models threat-model governance, disposition and traceability,
      not a stable reusable taxonomy of threat instances.
  artifact_surface_limit:
    note: >
      The current artifact catalog is good enough to start, but review-specific
      and traceability-specific artifacts remain thinner than the requirements
      imply.
open_questions:
  - Should `ACP-TMR-007` remain inside lifecycle governance, or later become part of a broader cross-slice evidence-governance capability?
  - Should `ACM-TMR-006` remain tied to reviewer accountability only, or later absorb stronger approval and go-live gate semantics once those mechanisms are better materialized?
  - Which future artifact should become the primary anchor for threat-traceability matrices and explicit review records once the artifact taxonomy expands?
  - At what point, if any, should reusable threat entities emerge from this slice without depending on weak canon-driven material?
