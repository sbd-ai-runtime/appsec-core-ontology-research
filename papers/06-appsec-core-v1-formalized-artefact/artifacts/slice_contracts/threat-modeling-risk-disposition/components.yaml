meta:
  name: AppSec Core Slice Components Draft
  version: '0.1'
  status: working_draft
  scope: threat_modeling_risk_disposition_and_mitigation_traceability
  description: >
    Minimal normalized subset of practices, mechanisms and artifacts used to
    validate the AppSec core slice draft for threat modeling, risk disposition
    and mitigation traceability.
  target_core_draft: ontology/appsec-core-threat-modeling-risk-disposition-draft.yaml
  target_mapping_draft: ontology/appsec-core-threat-modeling-risk-disposition-mapping-draft.yaml
normalized_practices:
  ACP-TMR-001:
    name: Threat Model Creation And Triggered Refresh
    practice_family: governance_and_review
    local_practice_type: modeling
    supports_objectives:
      - ACO-TMR-001
      - ACO-TMR-006
    description: Create threat models when required and refresh them when architectural change or risk trigger conditions make the current model stale
  ACP-TMR-002:
    name: DFD And Trust-Boundary Grounding
    practice_family: governance_and_review
    local_practice_type: representation
    supports_objectives:
      - ACO-TMR-002
      - ACO-TMR-007
    description: Ground threat analysis in explicit DFDs, trust boundaries and current architecture assumptions
  ACP-TMR-003:
    name: Structured Threat Analysis Method Selection
    practice_family: governance_and_review
    local_practice_type: methodology
    supports_objectives:
      - ACO-TMR-003
      - ACO-TMR-007
    description: Apply an explicit threat-analysis method with minimum coverage discipline appropriate to the risk context
  ACP-TMR-004:
    name: Threat Disposition And Accepted Risk Governance
    practice_family: governance_and_review
    local_practice_type: disposition
    supports_objectives:
      - ACO-TMR-004
      - ACO-TMR-007
    description: Record threat disposition, ownership and accepted-risk rationale explicitly rather than leaving identified threats undecided
  ACP-TMR-005:
    name: Threat Traceability Into Requirements And Validation
    practice_family: integrity_traceability_and_records
    local_practice_type: traceability
    supports_objectives:
      - ACO-TMR-005
      - ACO-TMR-007
    description: Keep explicit links from identified threats into mitigations, backlog work and validation evidence
  ACP-TMR-006:
    name: Independent Review And Threat Model Approval
    practice_family: governance_and_review
    local_practice_type: review
    supports_objectives:
      - ACO-TMR-006
      - ACO-TMR-007
    description: Subject threat models to independent review, approval and go-live governance where required
  ACP-TMR-007:
    name: Threat Model Artifact Governance
    practice_family: governance_and_review
    local_practice_type: review
    supports_objectives:
      - ACO-TMR-006
    description: Control access, classification and retention of threat-model artifacts so lifecycle governance remains auditable
  ACP-TMR-008:
    name: Security Requirements Identification And Derivation
    practice_family: governance_and_review
    local_practice_type: requirements_governance
    supports_objectives:
      - ACO-TMR-008
    description: >
      Process for identifying security requirements from internal sources
      (policies, risk assessments, threat models) and external sources
      (regulations, standards, industry guidance), deriving verifiable
      security criteria, and documenting them in a structured requirements
      portfolio. Covers the "where do requirements come from" facet of the
      lifecycle.
  ACP-TMR-009:
    name: Requirements Communication And Compliance Monitoring
    practice_family: governance_and_review
    local_practice_type: requirements_governance
    supports_objectives:
      - ACO-TMR-008
    description: >
      Process for communicating security requirements to all relevant
      stakeholders (development teams, third-party suppliers, acquirers),
      monitoring external regulatory and compliance changes that affect
      requirements, and triggering updates to the requirements portfolio
      when the regulatory, threat, or business context evolves. Covers
      the "where do requirements go and how do they stay current" facet.
normalized_mechanisms:
  ACM-TMR-001:
    name: Threat Representation Models
    mechanism_family: governance_and_review
    local_mechanism_type: representation_model
    source_semantic_ids:
      - sem:mechanism:dfds
      - sem:mechanism:trust-boundaries
      - sem:mechanism:diagramas-versionados
    supports_practices:
      - ACP-TMR-002
  ACM-TMR-002:
    name: Structured Threat Analysis Frameworks
    mechanism_family: governance_and_review
    local_mechanism_type: modeling_framework
    source_semantic_ids:
      - sem:mechanism:stride
      - sem:mechanism:linddun
      - sem:mechanism:pasta
    supports_practices:
      - ACP-TMR-003
  ACM-TMR-003:
    name: Threat Model Versioning Controls
    mechanism_family: integrity_traceability_and_records
    local_mechanism_type: versioning
    source_semantic_ids:
      - sem:mechanism:data-e-versao-do-modelo
    supports_practices:
      - ACP-TMR-001
      - ACP-TMR-007
  ACM-TMR-004:
    name: Explicit Threat Disposition Register
    mechanism_family: governance_and_review
    local_mechanism_type: governance_recording
    source_semantic_ids:
      - sem:mechanism:lista-de-ameacas-com-decisao-explicita
    supports_practices:
      - ACP-TMR-004
  ACM-TMR-005:
    name: Threat Mitigation Linkage Controls
    mechanism_family: integrity_traceability_and_records
    local_mechanism_type: traceability_control
    source_semantic_ids:
      - sem:mechanism:ligacao-a-requisitos-de-seguranca-ou-mitigacoes
    supports_practices:
      - ACP-TMR-005
  ACM-TMR-006:
    name: Reviewer Accountability And Consistency Gates
    mechanism_family: governance_and_review
    local_mechanism_type: gate
    source_semantic_ids:
      - sem:mechanism:identificacao-do-responsavel-pela-validacao
    supports_practices:
      - ACP-TMR-006
    note: >
      The current semantic anchor is narrower than the full review-governance
      problem, but it is enough to support a first normalized mechanism here.
  ACM-TMR-007:
    name: Requirements Registry And Derivation Traceability
    mechanism_family: governance_and_review
    local_mechanism_type: requirements_registry
    supports_practices:
      - ACP-TMR-008
    note: >
      Structured requirements database or registry that captures each
      requirement's origin (regulation, standard, threat model, policy),
      its derivation chain to verifiable criteria, and its coverage
      status across the SDLC.
      Tools: requirements management platforms (Jira, Azure DevOps,
      DOORS), traceability matrices, threat-to-requirement linkage.
  ACM-TMR-008:
    name: Compliance Monitoring And Regulatory Change Feeds
    mechanism_family: governance_and_review
    local_mechanism_type: compliance_monitoring
    supports_practices:
      - ACP-TMR-009
    note: >
      Automated or semi-automated monitoring of external regulatory and
      compliance changes that affect the organization's security requirements.
      Includes regulatory change alerting, compliance drift detection,
      and stakeholder notification workflows.
      Tools: compliance monitoring dashboards, regulatory intelligence
      feeds, GRC platforms, supplier communication workflows.
