notes:
  practice_surface_strength:
    note: >
      This slice has one of the strongest current chapter-local practice
      surfaces in the repo, which helps compensate for the thinner semantic
      mechanism catalog.
  mechanism_surface_limit:
    note: >
      Rollout-specific and rollback-specific mechanisms are still weaker than
      the requirement, practice and artifact surfaces, so several mechanisms
      remain explicitly objective-led.
  boundary_read:
    note: >
      Deploy credentials and post-deploy monitoring remain explicit bridges,
      not central slice semantics.
open_questions:
  - Which future mechanism should become the primary reusable anchor for progressive rollout strategies once the semantic mechanism catalog expands?
  - Should `ACA-RPR-008` remain inside this slice as a rollback-evidence support artifact, or later share part of its role with a future observability slice without collapsing into runtime response semantics?
