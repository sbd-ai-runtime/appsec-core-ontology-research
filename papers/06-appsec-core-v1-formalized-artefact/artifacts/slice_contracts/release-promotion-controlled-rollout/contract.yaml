meta:
  name: AppSec Core Slice Contract
  version: '0.1'
  status: working_contract
  scope: release_promotion_controlled_rollout_and_rollback_readiness
  description: >
    Consolidated contract for the ninth AppSec core slice. This file does not
    replace the detailed drafts; it defines the current stable reading across
    objectives, mapping rules, normalized components, confidence boundaries and
    immediate continuation criteria.
  related_artifacts:
    objective_draft: ontology/appsec-core-release-promotion-controlled-rollout-draft.yaml
    mapping_draft: ontology/appsec-core-release-promotion-controlled-rollout-mapping-draft.yaml
    components_draft: ontology/appsec-core-release-promotion-controlled-rollout-components-draft.yaml
    slice_note: docs/project/working-notes/2026-04-03-appsec-core-slice-release-promotion-controlled-rollout.md
    candidate_evaluation: docs/project/working-notes/2026-04-03-appsec-core-slice-9-candidate-evaluation.md
purpose:
  current_goal: >
    Stabilize a ninth reusable AppSec domain slice on a pre-runtime
    release-control surface centered on promotion integrity, staged validation,
    deployment traceability, rollback readiness and controlled rollout before
    opening a tenth slice or broadening deploy/runtime semantics prematurely.
  non_goals:
    - regulatory_overlay_expansion
    - v3_audit_persistence
    - source_provenance_transversal_layer
    - full_deploy_chapter_coverage
    - deploy_credentials_as_primary_center
    - tenth_appsec_slice
module_position:
  appsec_core:
    included:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
    deferred_or_weak:
      - Threat
      - Signal
  sbdtoe_manual_mapping:
    included:
      - requirement_to_objective_mapping
      - control_to_objective_mapping
      - practice_to_normalized_practice_mapping
  external_alignment:
    status: deferred
    note: SSDF, SAMM and SLSA stay out of this contract
objective_set:
  atomic_objectives:
    - ACO-RPR-001
    - ACO-RPR-002
    - ACO-RPR-003
    - ACO-RPR-004
    - ACO-RPR-005
    - ACO-RPR-006
    - ACO-RPR-008
    - ACO-RPR-009
    - ACO-RPR-010
  composite_objectives:
    - ACO-RPR-007
  composite_rules:
    ACO-RPR-007:
      meaning: Composite landing zone for the broad manual deploy-control surface as it applies to pre-runtime release assurance
      composed_of:
        - ACO-RPR-001
        - ACO-RPR-002
        - ACO-RPR-003
        - ACO-RPR-004
        - ACO-RPR-005
        - ACO-RPR-006
      usage_rule: >
        May remain a primary target for the broad deploy control, but
        requirement-level mappings should prefer atomic objectives when a
        direct semantic fit exists.
mapping_rules:
  control_level:
    rule: Broad deploy controls may map primarily to the composite objective when they span authorization, verification, gating, traceability, rollback and controlled rollout at once
    example:
      source_control_id: CTRL-infrastructure-deploy-seguro-e-reversivel-ae204be5f0
      primary_target: ACO-RPR-007
  requirement_level:
    rule: Requirement mappings should prefer atomic objectives when the requirement is semantically narrow
    examples:
      - source_requirement_id: DPL-001
        primary_target: ACO-RPR-001
      - source_requirement_id: DPL-005
        primary_target: ACO-RPR-005
      - source_requirement_id: DPL-009
        primary_target: ACO-RPR-006
  practice_level:
    rule: >
      Current release-control practices are strong enough to support the slice,
      but slice construction still begins from requirement and broad-control
      decomposition rather than from the chapter practice set alone.
  many_to_one_allowed: true
  one_to_many_allowed: true
component_subset:
  normalized_practices:
    - ACP-RPR-001
    - ACP-RPR-002
    - ACP-RPR-003
    - ACP-RPR-004
    - ACP-RPR-005
    - ACP-RPR-006
  normalized_mechanisms:
    - ACM-RPR-001
    - ACM-RPR-002
    - ACM-RPR-003
    - ACM-RPR-004
  normalized_artifacts:
    - ACA-RPR-001
    - ACA-RPR-002
    - ACA-RPR-003
    - ACA-RPR-004
    - ACA-RPR-005
    - ACA-RPR-006
    - ACA-RPR-007
    - ACA-RPR-008
evidence_pattern_position:
  current_status: supporting_inside_slice
  meaning: >
    EvidencePattern stays inside the slice for now as supporting AppSec core
    semantics that help deterministic review of release authorization, verified
    promotion, gating and rollback readiness.
  explicit_boundaries:
    - it_is_not_the_v3_audit_layer
    - it_is_not_the_primary_testing_slice
    - it_is_not_the_primary_monitoring_slice
  revisit_trigger: >
    Revisit only after this slice stabilizes and before opening any broader
    runtime-operations or observability capability.
confidence_boundaries:
  strong_inputs:
    - ontology/sbdtoe-ontology.yaml
    - data/entities/canonical_requirements_s7.json
    - data/entities/canonical_controls.json
    - data/entities/practices.json
    - data/entities/artifact_catalog.json
    - data/publish/semantic/requirement_control_links.jsonl
  useful_but_adjacent_inputs:
    - ontology/appsec-core-supply-chain-build-integrity-slice-contract.yaml
    - ontology/appsec-core-testing-security-validation-slice-contract.yaml
    - ontology/appsec-core-secrets-protected-config-slice-contract.yaml
  weak_or_deferred_inputs:
    - rollout_specific_semantic_mechanism_taxonomy
    - broader_runtime_monitoring_semantics
    - data/publish/semantic/signals.jsonl
  adjacent_but_not_central:
    - DPL-006
    - DPL-008
    - CTRL-monitoring-monitorizacao-e-resposta-operacional-1797f0af70
    - CTRL-secrets-gestao-de-segredos-e-identidades-operacionais-e2c86cdfe9
  rule: >
    Normalize this slice deploy-first, trust the strong `DPL` requirement,
    practice and artifact surfaces, but do not let deploy credentials,
    build-provenance generation or post-deploy monitoring redefine the center.
acceptance_read:
  stable_enough_now:
    - the ninth slice has a coherent objective set
    - the objective set distinguishes atomic and composite semantics
    - the mapping layer records the bridge-only treatment of `DPL-006` and `DPL-008`
    - a minimum component subset exists for practices, mechanisms and artifacts
    - the slice records the pre-runtime release boundary explicitly
  not_stable_enough_yet:
    - richer rollout-specific mechanism taxonomy
    - richer deploy-trace and staging-specific artifacts
    - signal-driven release-control semantics
    - external alignment for the slice
next_step:
  recommendation: >
    Treat the first nine slices as the current reference set and review
    whether the method invariants now need another explicit update before
    opening a tenth slice.
