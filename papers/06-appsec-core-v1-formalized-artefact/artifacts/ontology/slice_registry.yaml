meta:
  name: AppSec Core Slice Registry v0 Draft
  version: '1.0'
  status: working_draft
  maturity: consolidation_entry
  description: >
    Compact registry of the ten slice contracts that currently define the
    AppSec Core v0 reference set.
  related_artifacts:
    core_v0_draft: ontology/appsec-core-v0-draft.yaml
    manual_mapping_v0_draft: ontology/appsec-core-manual-mapping-v0-draft.yaml
    readiness_note: docs/working-notes/2026-04-03-appsec-core-v0-readiness.md
purpose:
  current_goal: >
    Provide one compact consumer-facing registry of the AppSec Core slice
    reference set without replacing the slice-local contracts.
  non_goals:
    - merging_all_slice_instances
    - replacing_slice_contracts
    - introducing_external_alignment
    - introducing_v3_runtime_semantics
