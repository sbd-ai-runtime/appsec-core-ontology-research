meta:
  name: AppSec Core Slice Contract
  version: '0.1'
  status: working_contract
  scope: secret_handling_protected_configuration_and_operational_identities
  description: >
    Consolidated contract for the sixth AppSec core slice. This file does not
    replace the detailed drafts; it defines the current stable reading across
    objectives, mapping rules, normalized components, confidence boundaries and
    immediate continuation criteria.
  related_artifacts:
    objective_draft: ontology/appsec-core-secrets-protected-config-draft.yaml
    mapping_draft: ontology/appsec-core-secrets-protected-config-mapping-draft.yaml
    components_draft: ontology/appsec-core-secrets-protected-config-components-draft.yaml
    slice_note: docs/project/working-notes/2026-04-03-appsec-core-slice-secrets-protected-config.md
    candidate_evaluation: docs/project/working-notes/2026-04-03-appsec-core-slice-6-candidate-evaluation.md
purpose:
  current_goal: >
    Stabilize a sixth reusable AppSec domain slice on a technical semantic
    surface centered on secret leak prevention, protected storage, operational
    identities and secret governance before opening a seventh slice or pulling
    in external-alignment frameworks.
  non_goals:
    - regulatory_overlay_expansion
    - v3_audit_persistence
    - source_provenance_transversal_layer
    - full_cryptography_domain_coverage
    - seventh_appsec_slice
module_position:
  appsec_core:
    included:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
    deferred_or_weak:
      - Threat
      - Signal
  sbdtoe_manual_mapping:
    included:
      - requirement_to_objective_mapping
      - control_to_objective_mapping
      - practice_to_normalized_practice_mapping
  external_alignment:
    status: deferred
    note: SSDF, SAMM and SLSA stay out of this contract
objective_set:
  atomic_objectives:
    - ACO-SPC-001
    - ACO-SPC-002
    - ACO-SPC-003
    - ACO-SPC-004
    - ACO-SPC-005
    - ACO-SPC-006
  composite_objectives:
    - ACO-SPC-007
  composite_rules:
    ACO-SPC-007:
      meaning: Composite landing zone for the broad manual secret-handling and operational-identity control surface
      composed_of:
        - ACO-SPC-001
        - ACO-SPC-002
        - ACO-SPC-003
        - ACO-SPC-004
        - ACO-SPC-005
        - ACO-SPC-006
      usage_rule: >
        May remain a primary target for the broad secrets control, but
        requirement-level mappings should prefer atomic objectives when a direct
        semantic fit exists.
mapping_rules:
  control_level:
    rule: Broad secret-handling controls may map primarily to composite objectives when they span leak prevention, storage, rotation, identity binding and governance at once
    example:
      source_control_id: CTRL-secrets-gestao-de-segredos-e-identidades-operacionais-e2c86cdfe9
      primary_target: ACO-SPC-007
  requirement_level:
    rule: Requirement mappings should prefer atomic objectives when the requirement is semantically narrow
    examples:
      - source_requirement_id: ENC-006
        primary_target: ACO-SPC-001
      - source_requirement_id: DPL-006
        primary_target: ACO-SPC-004
        secondary_target: ACO-SPC-005
  practice_level:
    rule: >
      This slice uses a cross-chapter practice surface, but slice construction
      still begins from requirement and control decomposition.
  many_to_one_allowed: true
  one_to_many_allowed: true
component_subset:
  normalized_practices:
    - ACP-SPC-001
    - ACP-SPC-002
    - ACP-SPC-003
    - ACP-SPC-004
    - ACP-SPC-005
    - ACP-SPC-006
  normalized_mechanisms:
    - ACM-SPC-001
    - ACM-SPC-002
    - ACM-SPC-003
    - ACM-SPC-004
  normalized_artifacts:
    - ACA-SPC-001
    - ACA-SPC-002
evidence_pattern_position:
  current_status: supporting_inside_slice
  meaning: >
    EvidencePattern stays inside the slice for now as a supporting AppSec core
    concept that helps deterministic review semantics around secret
    configuration, identity binding and future secret-governance evidence.
  explicit_boundaries:
    - it_is_not_the_v3_audit_layer
    - it_is_not_a_full_cryptography_model
    - it_must_not_turn_into_runtime_secret_telemetry_semantics
  revisit_trigger: >
    Revisit only after this slice stabilizes and before opening broader
    cross-slice secret-governance or cryptography semantics.
confidence_boundaries:
  strong_inputs:
    - ontology/sbdtoe-ontology.yaml
    - data/entities/canonical_requirements_s7.json
    - data/entities/canonical_controls.json
    - data/entities/practices.json
    - data/entities/artifact_catalog.json
    - data/publish/semantic/mechanisms.jsonl
  useful_but_adjacent_inputs:
    - 07-cicd-seguro
    - 11-deploy-seguro
    - ontology/appsec-core-identity-access-session-trust-slice-contract.yaml
  weak_or_deferred_inputs:
    - full_ENC_requirement_family_as_one_domain
    - data/publish/semantic/signals.jsonl
  adjacent_but_not_central:
    - CTRL-identity-gestao-de-identidades-acessos-e-ownership-d0919c69af
    - CTRL-infrastructure-deploy-seguro-e-reversivel-ae204be5f0
    - ENC-002
    - ENC-003
  rule: >
    Normalize this slice secrets-first, trust the current broad secrets control
    and the secret-handling requirement/practice surface, but do not let the
    slice drift into user identity, deploy governance replay or premature full
    cryptography normalization.
acceptance_read:
  stable_enough_now:
    - the sixth slice has a coherent objective set
    - the objective set distinguishes atomic and composite semantics
    - the mapping layer encodes the main control-level composite rule
    - a minimum component subset exists for practices, mechanisms and artifacts
    - the slice records the boundary between secret handling and full cryptography explicitly
  not_stable_enough_yet:
    - richer secret artifact taxonomy
    - full cryptographic primitive and data-protection semantics
    - signal-driven slice semantics
    - external alignment for the slice
next_step:
  recommendation: >
    Treat the first six slices as the current reference set and review whether
    the method invariants now need another explicit update before opening a
    seventh slice.
