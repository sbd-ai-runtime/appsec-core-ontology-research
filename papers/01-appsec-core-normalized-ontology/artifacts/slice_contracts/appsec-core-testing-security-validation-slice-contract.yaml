meta:
  name: AppSec Core Slice Contract
  version: '0.1'
  status: working_contract
  scope: testing_security_validation_and_empirical_assurance
  description: >
    Consolidated contract for the fourth AppSec core slice. This file does not
    replace the detailed drafts; it defines the current stable reading across
    objectives, mapping rules, normalized components, confidence boundaries and
    immediate continuation criteria.
  related_artifacts:
    objective_draft: ontology/appsec-core-testing-security-validation-draft.yaml
    mapping_draft: ontology/appsec-core-testing-security-validation-mapping-draft.yaml
    components_draft: ontology/appsec-core-testing-security-validation-components-draft.yaml
    slice_note: docs/project/working-notes/2026-04-03-appsec-core-slice-testing-security-validation.md
    candidate_evaluation: docs/project/working-notes/2026-04-03-appsec-core-slice-4-candidate-evaluation.md
purpose:
  current_goal: >
    Stabilize a fourth reusable AppSec domain slice on a validation-time
    semantic surface centered on risk-based testing, empirical assurance,
    reproducible evidence and release-relevant test interpretation before
    opening a fifth slice or pulling in external-alignment frameworks.
  non_goals:
    - regulatory_overlay_expansion
    - v3_audit_persistence
    - source_provenance_transversal_layer
    - fifth_appsec_slice
module_position:
  appsec_core:
    included:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
    deferred_or_weak:
      - Threat
      - Signal
  sbdtoe_manual_mapping:
    included:
      - requirement_to_objective_mapping
      - control_to_objective_mapping
      - practice_to_normalized_practice_mapping
  external_alignment:
    status: deferred
    note: SSDF, SAMM and SLSA stay out of this contract
objective_set:
  atomic_objectives:
    - ACO-TSV-001
    - ACO-TSV-002
    - ACO-TSV-003
    - ACO-TSV-004
    - ACO-TSV-005
    - ACO-TSV-006
  composite_objectives:
    - ACO-TSV-007
  composite_rules:
    ACO-TSV-007:
      meaning: Composite landing zone for the broad manual testing-assurance control surface
      composed_of:
        - ACO-TSV-001
        - ACO-TSV-002
        - ACO-TSV-003
        - ACO-TSV-004
        - ACO-TSV-005
        - ACO-TSV-006
      usage_rule: >
        May remain a primary target for the broad testing control, but
        requirement-level mappings should prefer atomic objectives when a direct
        semantic fit exists.
mapping_rules:
  control_level:
    rule: Broad testing-governance controls may map primarily to composite objectives when they span strategy, signal quality, evidence, gating and deeper empirical testing at once
    example:
      source_control_id: CTRL-testing-testes-de-seguranca-baseados-em-risco-55dcb62d34
      primary_target: ACO-TSV-007
  requirement_level:
    rule: Requirement mappings should prefer atomic objectives when the requirement is semantically narrow
    examples:
      - source_requirement_id: TST-005
        primary_target: ACO-TSV-005
      - source_requirement_id: TST-008
        primary_target: ACO-TSV-006
        secondary_target: ACO-TSV-003
  practice_level:
    rule: >
      The testing chapter already provides a strong enough practice surface to
      support normalization, but control and requirement decomposition still
      remain the primary starting point.
  many_to_one_allowed: true
  one_to_many_allowed: true
component_subset:
  normalized_practices:
    - ACP-TSV-001
    - ACP-TSV-002
    - ACP-TSV-003
    - ACP-TSV-004
    - ACP-TSV-005
    - ACP-TSV-006
    - ACP-TSV-007
  normalized_mechanisms:
    - ACM-TSV-001
    - ACM-TSV-002
    - ACM-TSV-003
    - ACM-TSV-004
    - ACM-TSV-005
  normalized_artifacts:
    - ACA-TSV-001
    - ACA-TSV-002
    - ACA-TSV-003
    - ACA-TSV-004
    - ACA-TSV-005
    - ACA-TSV-006
evidence_pattern_position:
  current_status: supporting_inside_slice
  meaning: >
    EvidencePattern stays inside the slice for now as a supporting AppSec core
    concept that helps deterministic review semantics around reports, release
    gates and reproducible evidence.
  explicit_boundaries:
    - it_is_not_the_v3_audit_layer
    - it_is_not_yet_split_into_a_separate_verification_module
    - it_must_not_turn_testing_semantics_into_runtime_operations
  revisit_trigger: >
    Revisit only after this slice stabilizes and before opening broader
    cross-slice validation or finding-governance semantics.
confidence_boundaries:
  strong_inputs:
    - ontology/sbdtoe-ontology.yaml
    - data/entities/canonical_requirements_s7.json
    - data/entities/canonical_controls.json
    - data/entities/practices.json
    - data/entities/artifact_catalog.json
  useful_but_weaker_inputs:
    - data/publish/semantic/mechanisms.jsonl
    - data/publish/semantic/patterns.jsonl
  weak_or_deferred_inputs:
    - data/publish/semantic/signals.jsonl
    - data/entities/mitigated_threats.json
  adjacent_but_not_central:
    - DEV
    - VAL
    - persistent_findings_history
    - runtime_operational_response
  rule: >
    Normalize this slice testing-first, trust the strong `TST` requirement and
    `10-testes-seguranca` practice surfaces, but do not let broader
    development-validation semantics or future `V3` concerns blur the slice
    boundary.
acceptance_read:
  stable_enough_now:
    - the fourth slice has a coherent objective set
    - the objective set distinguishes atomic and composite semantics
    - the mapping layer encodes the main control-level composite rule
    - a minimum component subset exists for practices, mechanisms and artifacts
    - the slice records `V3` boundary pressure explicitly instead of hiding it
  not_stable_enough_yet:
    - final testing artifact taxonomy
    - shared cross-slice finding-governance capability
    - signal-driven slice semantics
    - external alignment for the slice
next_step:
  recommendation: >
    Treat the first four slices as a stronger method reference set and review
    whether the next slice should stress another contrast surface rather than
    opening a near-neighbor of testing too early.
