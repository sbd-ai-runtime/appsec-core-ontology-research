meta:
  name: AppSec Core v0 Consolidated Review
  version: '0.1'
  status: review_candidate
  maturity: consolidation_checkpoint
  description: >
    Single-file consolidated review surface for AppSec Core v0. This file is
    intended to be the easiest review entrypoint while the modular drafts
    remain the source of truth for slice-local detail.
  related_artifacts:
    working_spine: ontology/appsec-core-v0-draft.yaml
    surface_contract: ontology/appsec-core-v0-surface-contract.yaml
    slice_registry: ontology/appsec-core-slice-registry-v0-draft.yaml
    instance_index: ontology/appsec-core-v0-instance-index.yaml
    evidence_pattern_contract: ontology/appsec-core-evidence-pattern-v0-draft.yaml
    evidence_pattern_index: ontology/appsec-core-evidence-pattern-index-v0.yaml
    entity_schema: ontology/appsec-core-entity-schema-v0-draft.yaml
    cross_slice_vocabulary: ontology/appsec-core-cross-slice-vocabulary-v0-draft.yaml
    manual_mapping_contract: ontology/appsec-core-manual-mapping-v0-draft.yaml
    readiness_note: docs/project/working-notes/2026-04-03-appsec-core-v0-readiness.md
purpose:
  current_goal: >
    Give one compact YAML for review of the current AppSec Core v0 shape,
    boundaries, slice coverage and indexed instance surface.
  non_goals:
    - replacing_slice_local_contracts_or_drafts
    - publishing_external_alignment
    - introducing_v3_runtime_semantics
    - introducing_source_provenance_semantics
read_this_as:
  this_file_is:
    - single_file_review_entrypoint
    - consolidated_summary_of_the_current_v0_shape
    - packaging_checkpoint_for_validation
  this_file_is_not:
    - only_source_of_truth
    - fully_merged_global_instance_database
    - final_public_release_artifact
layer_split:
  appsec_core:
    status: active_v0_target
    first_class_entities:
      - ControlObjective
      - Practice
      - Mechanism
      - Artifact
      - EvidencePattern
    supporting_but_not_core_driving:
      - Threat
      - Signal
    explicitly_deferred:
      - Problem
      - Gap
      - Capability
  sbdtoe_manual_mapping:
    status: active_and_separate
    included:
      - requirement_to_objective_mapping
      - control_to_objective_mapping
      - bridge_only_observations
  external_alignment:
    status: deferred
    note: SSDF, SAMM and SLSA stay outside v0
  v3_verification_runtime:
    status: deferred
    note: persistent findings and runtime verification history stay outside v0
  source_provenance_layer:
    status: parked_and_transversal
    note: provenance and attestation stay outside core and manual mapping
stable_v0_shape:
  objective_model:
    objective_kind: [atomic, composite]
    objective_type: [governance, preventive, detective, corrective]
    requirement_level_rule: atomic_first
    control_level_rule: broad_controls_may_land_on_composite
  entity_semantic_read:
    Practice:
      meaning: >
        Prescriptive human or process discipline that should exist
        independently of a specific tool or runtime product choice.
    Mechanism:
      meaning: >
        Concrete technical or enforceable means used to implement practices or
        directly realize objectives.
    coupling_rule:
      - mechanisms_should_reference_supported_practices_when_that_link_is_known
  practice_families:
    - governance_and_review
    - policy_and_gate_enforcement
    - identity_and_trust_control
    - validation_and_analysis
    - integrity_traceability_and_records
    - rollout_recovery_and_runtime_records
  mechanism_families:
    - governance_and_review
    - policy_and_gate_enforcement
    - identity_and_trust_control
    - validation_and_analysis
    - integrity_traceability_and_records
    - rollout_recovery_and_runtime_records
  canonical_artifact_roles:
    - configuration
    - governance_record
    - review_record
    - approval_record
    - gate_record
    - inventory
    - attestation
    - report
    - evidence_package
    - operational_record
    - build_definition
    - release_artifact
    - model
    - validation_output
    - binding_record
  stable_relations:
    - objective_realized_by_practice
    - objective_implemented_by_mechanism
    - objective_expects_artifact
    - objective_verified_by_evidence_pattern
    - artifact_supports_evidence_pattern
    - manual_requirement_maps_to_objective
    - manual_control_maps_to_objective
  mapping_rules:
    - bridge_only_observations_use_source_reference
    - slice_local_nuance_may_remain_in_local_role
    - merged_global_instance_set_is_optional_for_v0
  method_guardrails:
    - slice_cardinality_is_methodological_not_ontological
    - future_versions_may_use_different_slice_counts_when_the_domain_requires_it
