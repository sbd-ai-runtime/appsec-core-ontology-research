global_instance_index:
  indexed_now:
    total_indexed_instances: 234
    counts:
      control_objectives: 70
      practices: 63
      mechanisms: 48
      artifacts: 53
  supporting_global_surfaces:
    EvidencePattern:
      status: one_runtime_aligned_global_support_index_now_exists
      artifacts:
        - ontology/appsec-core-evidence-pattern-v0-draft.yaml
        - ontology/appsec-core-evidence-pattern-index-v0.yaml
      limitations:
        - supported_signal_ids_are_not_materialized_in_current_runtime_output
        - verification_when_and_responsible_roles_are_sparse
        - the_current_surface_is_runtime_aligned_not_yet_full_slice_normalized
      public_claim:
        v0_supports:
          - expected_evidence_shape
          - validation_method_expression
          - artifact_traceability
          - deterministic_review_support
        v0_does_not_claim:
          - execution_binding
          - verification_run_history
          - full_signal_coverage
          - runtime_decision_trace
  not_indexed_globally_yet:
    Threat:
      status: supporting_not_core_driving
    Signal:
      status: supporting_not_core_driving
review_read_order:
  - read_this_file_first
  - drill_into_ontology/appsec-core-v0-surface-contract.yaml_for_packaging_rules
  - drill_into_ontology/appsec-core-v0-instance-index.yaml_for_full_id_lists
  - drill_into_ontology/appsec-core-evidence-pattern-v0-draft.yaml_for_supporting_semantics
  - drill_into_ontology/appsec-core-evidence-pattern-index-v0.yaml_for_runtime_aligned_coverage
  - drill_into_ontology/appsec-core-manual-mapping-v0-draft.yaml_for_projection_rules
  - open_slice_contracts_only_when_detail_is_needed
current_open_items:
  - whether_the_current_evidencepattern_support_index_is_enough_for_first_publication
  - whether_more_canonical_role_flattening_is_worth_the_loss_of_slice_local_nuance
  - whether_a_heavier_merged_instance_set_adds_real_value_beyond_the_current_index
acceptance_read:
  stable_enough_now:
    - one_single_yaml_now_exists_for_appsec_v0_review
    - the_modular_source_of_truth_remains_preserved
    - the_reference_set_is_broad_enough_without_slice_11
    - one_supporting_global_evidencepattern_surface_now_exists
  not_done_yet:
    - final_public_release_packaging
    - external_alignment
    - v3
