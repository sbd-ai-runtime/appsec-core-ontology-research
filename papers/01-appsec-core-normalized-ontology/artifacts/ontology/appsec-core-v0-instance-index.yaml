meta:
  name: AppSec Core v0 Instance Index
  version: '0.1'
  status: working_draft
  maturity: consolidation_entry
  description: >
    Lightweight global instance index for AppSec Core v0. This index provides
    one compact cross-slice navigation surface for normalized objectives,
    practices, mechanisms and artifacts without forcing one fully merged
    instance set too early.
  related_artifacts:
    core_v0_draft: ontology/appsec-core-v0-draft.yaml
    surface_contract: ontology/appsec-core-v0-surface-contract.yaml
    slice_registry: ontology/appsec-core-slice-registry-v0-draft.yaml
    manual_mapping_contract: ontology/appsec-core-manual-mapping-v0-draft.yaml
    readiness_note: docs/project/working-notes/2026-04-03-appsec-core-v0-readiness.md
purpose:
  current_goal: >
    Provide one compact global index of first-pass AppSec Core instances that
    is sufficient for v0 packaging and navigation.
  non_goals:
    - replacing_slice_local_instance_drafts
    - flattening_every_slice_nuance
    - publishing_global_threat_or_signal_instances
    - publishing_global_evidencepattern_instances_before_they_exist_slice_locally
instance_families:
  indexed_now:
    ControlObjective:
      source: normalized_objectives_in_slice_drafts
      total_count: 70
    Practice:
      source: normalized_practices_in_slice_component_drafts
      total_count: 63
    Mechanism:
      source: normalized_mechanisms_in_slice_component_drafts
      total_count: 48
    Artifact:
      source: normalized_artifacts_in_slice_component_drafts
      total_count: 53
  not_globally_indexed_yet:
    EvidencePattern:
      reason: >
        EvidencePattern is first-class in the shared schema, but the current
        slice drafts do not yet expose normalized evidence-pattern instance
        sets in a consistent slice-local form.
    Threat:
      reason: informative_but_not_core_driving
    Signal:
      reason: informative_but_not_core_driving
