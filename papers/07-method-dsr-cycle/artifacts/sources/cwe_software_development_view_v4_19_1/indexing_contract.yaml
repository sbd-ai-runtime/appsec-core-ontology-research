meta:
  pilot_id: cwe_software_development_view_v4_19_1
  status: published_traceability_surface_cluster_compared
input_contract:
  source_manifest: pilots/cwe_software_development_view_v4_19_1/source_manifest.yaml
  accepted_source_artifacts:
    - html_snapshot
    - csv_zip_snapshot
    - xml_zip_snapshot
  required_provenance_fields:
    - source_document_id
    - canonical_url
    - publication_date
    - retrieved_at
    - checksum_sha256
stage_outputs:
  source_inventory:
    path: data/cwe_software_development_view_v4_19_1/stubs/external_source_inventory.json
  source_unit_inventory:
    path: data/cwe_software_development_view_v4_19_1/stubs/source_unit_inventory.json
  source_object_inventory:
    path: data/cwe_software_development_view_v4_19_1/stubs/source_object_inventory.json
  normalized_core_objects:
    path: data/cwe_software_development_view_v4_19_1/stubs/appsec_core_normalization.json
  manual_gap_analysis:
    path: data/cwe_software_development_view_v4_19_1/stubs/manual_gap_analysis.json
  published_traceability_cluster_comparison:
    path: data/cwe_software_development_view_v4_19_1/stubs/published_manual_traceability_cluster_comparison.json
  traceability_candidates:
    path: data/cwe_software_development_view_v4_19_1/stubs/traceability_publication_candidates.json
pipeline_scripts:
  source_object_extraction:
    path: scripts/extract_cwe_source_objects.py
  appsec_core_normalization:
    path: scripts/normalize_cwe_to_appsec_core.py
  manual_gap_analysis:
    path: scripts/derive_cwe_manual_gap_analysis.py
normalization_rules:
  - external_objects_land_in_appsec_core_before_any_manual_comparison
  - source_scope_starts_with_view_699_not_with_the_full_cwe_universe
  - rationale_for_core_mapping_must_be_preserved
  - weaknesses_outside_intended_appsec_scope_may_be_marked_out_of_scope_for_appsec_core
  - comparison_results_must_distinguish_manual_gap_from_appsec_core_gap_and_comparison_gap
comparison_rules:
  status_labels:
    - covered
    - partial
    - bridge_only
    - ambiguous
    - manual_gap
    - appsec_core_gap
    - comparison_gap
    - out_of_scope_for_appsec_core
