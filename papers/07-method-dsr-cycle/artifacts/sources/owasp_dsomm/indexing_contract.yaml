notes:
  - This pilot is intentionally opened before any decision to create a separate maturity or capability model beside the AppSec Core.
  - The first question was whether current core semantics absorb most DSOMM domain content cleanly enough.
  - The second question was whether the residual pressure is domain pressure or maturity-layer pressure.
  - The current frozen source cut is DSOMM generated model `4.2.0` plus `DevSecOps-MaturityModel-data` commit `fda3b250ae9325b8c10f23318c9f0768eaa60b98`.
  - No direct manual_gap is asserted after comparison against the published manual surface.
  - The sharpest residual pressure remains `Application Hardening`, while most other DSOMM tension now reads as traceability repair, comparison-method pressure or scope boundary.
